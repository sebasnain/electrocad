<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ElectroCad 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
:root{
  --bg:#0f1117;--bg2:#161b24;--bg3:#1e2433;--bg4:#262d3d;
  --ac:#00c8ff;--ac3:#00e87a;--warn:#f5a623;--danger:#f04040;
  --tx:#dde3ee;--tx2:#7a8499;--tx3:#4a5168;
  --bd:rgba(0,200,255,0.13);--bd2:rgba(255,255,255,0.06);
}
body{
  background:var(--bg);color:var(--tx);
  font-family:'Inter',system-ui,sans-serif;font-size:12px;
  display:grid;
  grid-template-rows:42px 1fr;
  grid-template-columns:52px 1fr 232px;
  grid-template-areas:"hdr hdr hdr" "lp cv rp";
}
/* HEADER */
#hdr{
  grid-area:hdr;
  background:var(--bg2);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;padding:0 10px;gap:6px;
}
.logo{font-family:monospace;font-size:15px;font-weight:700;color:var(--ac);letter-spacing:2px}
.ver{font-size:9px;color:var(--tx3);margin-right:4px}
.vsep{width:1px;height:22px;background:var(--bd2);margin:0 3px}
.proj-inp{background:transparent;border:none;border-bottom:1px solid var(--bd2);color:var(--tx);font-size:12px;font-family:inherit;padding:2px 4px;outline:none;width:150px}
.proj-inp:focus{border-bottom-color:var(--ac)}
.sind{font-size:10px;color:var(--tx3)}
.sind.dirty{color:var(--warn)}.sind.saved{color:var(--ac3)}
.lbar{display:flex;align-items:center;gap:2px;padding:0 5px;background:var(--bg3);border-radius:5px;height:26px}
.lbtn{display:flex;align-items:center;gap:4px;padding:2px 7px;border-radius:3px;border:none;background:transparent;cursor:pointer;font-size:10px;font-family:inherit;color:var(--tx);transition:all .12s}
.lbtn .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:opacity .15s}
.lbtn.hid{color:var(--tx3);text-decoration:line-through;opacity:.5}
.lbtn.dim{color:var(--tx2);font-style:italic;opacity:.7}
.lbtn:hover{background:var(--bg4)}
.hright{margin-left:auto;display:flex;align-items:center;gap:5px}
.hbtn{padding:3px 9px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--tx2);cursor:pointer;font-size:11px;font-family:inherit;transition:all .12s}
.hbtn:hover{background:rgba(0,200,255,.1);color:var(--ac);border-color:var(--ac)}

/* LEFT PANEL */
#lp{
  grid-area:lp;
  background:var(--bg2);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0;gap:3px;overflow-y:auto;overflow-x:hidden;
}
.tb{width:36px;height:36px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;position:relative;flex-shrink:0}
.tb:hover{background:var(--bg3);color:var(--tx)}
.tb.act{background:rgba(0,200,255,.12);color:var(--ac);border-color:var(--ac)}
.tb.act-p{background:rgba(245,166,35,.12);color:var(--warn);border-color:var(--warn)}
.tb.act-e{background:rgba(240,64,64,.1);color:var(--danger);border-color:var(--danger)}
.tb.act-d{background:rgba(0,200,255,.08);color:var(--ac);border-color:rgba(0,200,255,.4)}
.tsep{width:28px;height:1px;background:var(--bd2);margin:2px 0;flex-shrink:0}
.tlbl{font-size:7px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;flex-shrink:0}
.ttp{position:absolute;left:44px;top:50%;transform:translateY(-50%);background:var(--bg4);border:1px solid var(--bd);border-radius:4px;padding:3px 8px;font-size:10px;color:var(--tx);white-space:nowrap;pointer-events:none;display:none;z-index:1000}
.tb:hover .ttp{display:block}

/* CANVAS AREA */
#cv-area{
  grid-area:cv;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}
#cv{display:block;position:absolute;top:0;left:0;}
.sbar{
  position:absolute;bottom:0;left:0;right:0;height:22px;
  background:rgba(15,17,23,.93);border-top:1px solid var(--bd2);
  display:flex;align-items:center;padding:0 10px;gap:14px;
  pointer-events:none;z-index:10;
}
.sbi{font-size:10px;color:var(--tx2)}
.sbi span{color:var(--tx);font-family:monospace}

/* RIGHT PANEL */
#rp{
  grid-area:rp;
  background:var(--bg2);border-left:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;
}
.rptabs{display:flex;border-bottom:1px solid var(--bd2)}
.rptab{flex:1;padding:7px 4px;text-align:center;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.rptab.on{color:var(--ac);border-bottom-color:var(--ac)}
.rpbody{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.rps{border-bottom:1px solid var(--bd2);padding:9px 11px}
.rpt{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--ac);margin-bottom:7px}
.rpr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.rpl{font-size:11px;color:var(--tx2)}
.rpv{font-family:monospace;font-size:12px;color:var(--tx)}
.rpv.ok{color:var(--ac3)}.rpv.w{color:var(--warn)}
.rpsel{background:var(--bg3);border:1px solid var(--bd2);border-radius:3px;padding:3px 6px;color:var(--tx);font-size:11px;outline:none;font-family:inherit}
.rpsel:focus{border-color:var(--ac)}
.ic{background:var(--bg3);border:1px solid var(--bd2);border-radius:5px;padding:6px 9px;margin-bottom:4px;cursor:pointer;transition:all .12s;position:relative}
.ic:hover{border-color:var(--ac)}
.ic.sel{border-color:var(--warn);background:rgba(245,166,35,.06)}
.icn{font-size:11px;color:var(--tx);margin-bottom:2px}
.icm{font-size:9.5px;color:var(--tx2);font-family:monospace}
.icdel{position:absolute;top:5px;right:6px;background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:10px}
.icdel:hover{color:var(--danger)}
.noitem{padding:12px 8px;text-align:center;color:var(--tx3);font-size:11px;line-height:1.6}
.mat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd2);font-size:11px}
.mat-row:last-child{border-bottom:none}
.mat-name{color:var(--tx2)}.mat-qty{font-family:monospace;color:var(--ac3);font-weight:600}

/* MODAL PDF */
.pdf-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center}
.pdf-overlay.hidden{display:none}
.pdf-modal{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;width:420px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.pdf-header{padding:14px 16px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;gap:8px}
.pdf-title{font-family:monospace;font-size:14px;font-weight:700;color:var(--ac3);letter-spacing:1px;flex:1}
.pdf-body{flex:1;overflow-y:auto;padding:14px}
.pdf-section{margin-bottom:14px}
.pdf-section-title{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--ac);margin-bottom:8px}
.pdf-field{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.pdf-field label{font-size:9.5px;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px}
.pdf-field input{background:var(--bg3);border:1px solid var(--bd2);border-radius:4px;padding:5px 8px;color:var(--tx);font-size:12px;font-family:inherit;outline:none}
.pdf-field input:focus{border-color:var(--ac)}
.pdf-footer{padding:12px 16px;border-top:1px solid var(--bd2);display:flex;gap:8px;justify-content:flex-end}
.pdf-opt{display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:pointer}
.pdf-opt input{cursor:pointer}
.pdf-opt span{font-size:11px;color:var(--tx2)}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
.progress-fill{height:100%;background:var(--ac3);border-radius:2px;transition:width .3s}
#ftip{position:fixed;background:rgba(15,17,23,.96);border:1px solid var(--bd);border-radius:5px;padding:5px 10px;font-size:11px;color:var(--tx);pointer-events:none;display:none;z-index:9999;font-family:monospace;white-space:nowrap}
</style>
</head>
<body>

<div id="ftip"></div>

<!-- MODAL PDF -->
<div class="pdf-overlay hidden" id="pdfOverlay" onclick="if(event.target===this)closePdfModal()">
  <div class="pdf-modal">
    <div class="pdf-header">
      <span class="pdf-title">↓ EXPORTAR PDF</span>
      <button class="modal-close" onclick="closePdfModal()" style="width:24px;height:24px;border-radius:50%;border:1px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;font-size:13px">✕</button>
    </div>
    <div class="pdf-body">
      <div class="pdf-section">
        <div class="pdf-section-title">Datos del proyecto</div>
        <div class="pdf-field"><label>Nombre del proyecto</label><input type="text" id="pdf-proj" placeholder="Instalación eléctrica"></div>
        <div class="pdf-field"><label>Dirección de la obra</label><input type="text" id="pdf-addr" placeholder="Calle y número, ciudad"></div>
        <div class="pdf-field"><label>Fecha</label><input type="text" id="pdf-date" placeholder=""></div>
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">Datos del profesional</div>
        <div class="pdf-field"><label>Nombre</label><input type="text" id="pdf-name" placeholder="Nombre del electricista"></div>
        <div class="pdf-field"><label>Matrícula / CUIT</label><input type="text" id="pdf-mat" placeholder="Mat. N° 1234"></div>
        <div class="pdf-field"><label>Teléfono</label><input type="text" id="pdf-tel" placeholder="299 4567890"></div>
      </div>
      <div class="pdf-section">
        <div class="pdf-section-title">Opciones de exportación</div>
        <label class="pdf-opt"><input type="checkbox" id="pdf-opt-plan" checked><span>Hoja 1 — Plano del croquis</span></label>
        <label class="pdf-opt"><input type="checkbox" id="pdf-opt-mat" checked><span>Hoja 2 — Lista de materiales y circuitos</span></label>
        <label class="pdf-opt"><input type="checkbox" id="pdf-opt-border" checked><span>Incluir cartela / marco</span></label>
        <label class="pdf-opt"><input type="checkbox" id="pdf-opt-legend" checked><span>Incluir referencias de circuitos</span></label>
      </div>
      <div class="progress-bar" id="pdfProgress"><div class="progress-fill" id="pdfProgressFill" style="width:0%"></div></div>
    </div>
    <div class="pdf-footer">
      <button class="hbtn" onclick="closePdfModal()">Cancelar</button>
      <button class="hbtn" style="color:var(--ac3);border-color:var(--ac3);font-weight:600" onclick="generatePDF()">Generar PDF</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<header id="hdr">
  <div class="logo">ELECTROCAD</div><div class="ver">2.0</div>
  <div class="vsep"></div>
  <input class="proj-inp" id="projName" type="text" value="Nuevo plano">
  <div class="vsep"></div>
  <div class="lbar">
    <button class="lbtn" id="lb-walls" onclick="toggleLayer('walls')"><div class="dot" style="background:#c8d4e8"></div>Paredes</button>
    <button class="lbtn" id="lb-pipes" onclick="toggleLayer('pipes')"><div class="dot" style="background:#f5a623"></div>Cañerías</button>
    <button class="lbtn" id="lb-elec" onclick="toggleLayer('elec')"><div class="dot" style="background:#00e87a"></div>Simbología</button>
    <button class="lbtn" id="lb-wires" onclick="toggleLayer('wires')"><div class="dot" style="background:#ff8888"></div>Conductores</button>
    <button class="lbtn" id="lb-dims" onclick="toggleLayer('dims')"><div class="dot" style="background:#00c8ff"></div>Cotas</button>
  </div>
  <span class="sind" id="sInd">Nuevo</span>
  <div class="hright">
    <button class="hbtn" onclick="saveProject()">💾 Guardar</button>
    <button class="hbtn" onclick="openLoad()">📂 Abrir</button>
    <button class="hbtn" onclick="exportFile()">↓ HTML</button>
    <button class="hbtn" style="color:var(--ac3);border-color:var(--ac3)" onclick="exportPDF()">↓ PDF</button>
  </div>
</header>

<!-- LEFT PANEL -->
<div id="lp">
  <div class="tlbl">PLANO</div>
  <button class="tb act" id="t-sel" onclick="setTool('sel')">
    <svg width="14" height="14" viewBox="0 0 16 16"><path d="M3 2l10 6-5 1-2 5L3 2z" fill="currentColor"/></svg>
    <div class="ttp">Seleccionar (S)</div>
  </button>
  <button class="tb" id="t-pan" onclick="setTool('pan')">
    <svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 3v10M3 8h10M5.5 5.5L3 8l2.5 2.5M10.5 5.5L13 8l-2.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div class="ttp">Mover vista (H)</div>
  </button>
  <button class="tb" id="t-era" onclick="setTool('era')">
    <svg width="14" height="14" viewBox="0 0 16 16"><path d="M3 13l3-3m0 0L9 7l3 3-3 3-3-3zm0 0L3 7l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <div class="ttp">Borrar (E)</div>
  </button>
  <div class="tsep"></div>
  <div class="tlbl">CAÑ.</div>
  <button class="tb" id="t-wall" onclick="setTool('wall')">
    <svg width="14" height="14" viewBox="0 0 16 16"><rect x="2" y="7" width="12" height="2" rx="1" fill="currentColor"/><circle cx="2.5" cy="8" r="1.5" fill="currentColor"/><circle cx="13.5" cy="8" r="1.5" fill="currentColor"/></svg>
    <div class="ttp">Pared (W)</div>
  </button>
  <button class="tb" id="t-oct" onclick="setTool('oct')">
    <svg width="14" height="14" viewBox="0 0 16 16"><polygon points="5,2 11,2 14,5 14,11 11,14 5,14 2,11 2,5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
    <div class="ttp">Caja octogonal (O)</div>
  </button>
  <button class="tb" id="t-rct" onclick="setTool('rct')">
    <svg width="14" height="14" viewBox="0 0 16 16"><rect x="2" y="4" width="12" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
    <div class="ttp">Caja rectangular (R)</div>
  </button>
  <button class="tb" id="t-tab" onclick="setTool('tab')">
    <svg width="14" height="14" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="1" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="2" y1="6" x2="14" y2="6" stroke="currentColor" stroke-width="1"/><rect x="4" y="8" width="2" height="3" rx=".4" fill="currentColor" opacity=".7"/><rect x="7" y="8" width="2" height="3" rx=".4" fill="currentColor" opacity=".7"/></svg>
    <div class="ttp">Tablero (T)</div>
  </button>
  <button class="tb" id="t-pipe" onclick="setTool('pipe')">
    <svg width="14" height="14" viewBox="0 0 16 16"><path d="M2 12 C4 12 4 4 8 4 C12 4 12 12 14 12" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="2" cy="12" r="2" fill="currentColor"/><circle cx="14" cy="12" r="2" fill="currentColor"/></svg>
    <div class="ttp">Corrugado (C)</div>
  </button>
  <div class="tsep"></div>
  <div class="tlbl">COTA</div>
  <button class="tb" id="t-dim" onclick="setTool('dim')">
    <svg width="14" height="14" viewBox="0 0 16 16"><line x1="2" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="9" x2="2" y2="13" stroke="currentColor" stroke-width="1.2"/><line x1="14" y1="9" x2="14" y2="13" stroke="currentColor" stroke-width="1.2"/></svg>
    <div class="ttp">Cota (D)</div>
  </button>
  <div class="tsep"></div>
  <div class="tlbl">AEA</div>
  <button class="tb" id="t-luz" onclick="setTool('luz')">
    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5.5" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="4.1" y1="4.1" x2="11.9" y2="11.9" stroke="currentColor" stroke-width="1.3"/><line x1="11.9" y1="4.1" x2="4.1" y2="11.9" stroke="currentColor" stroke-width="1.3"/></svg>
    <div class="ttp">Luz techo (1)</div>
  </button>
  <button class="tb" id="t-luz-p" onclick="setTool('luz-p')">
    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="5" r="4" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="5.2" y1="2.2" x2="10.8" y2="7.8" stroke="currentColor" stroke-width="1.3"/><line x1="10.8" y1="2.2" x2="5.2" y2="7.8" stroke="currentColor" stroke-width="1.3"/><line x1="8" y1="9" x2="8" y2="13" stroke="currentColor" stroke-width="1.3"/><line x1="2" y1="13" x2="14" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>
    <div class="ttp">Luz pared (2)</div>
  </button>
  <button class="tb" id="t-toma-s" onclick="setTool('toma-s')">
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 9 A5 5 0 0 1 13 9" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="9" x2="15" y2="9" stroke="currentColor" stroke-width="1.5"/><rect x="7" y="3.5" width="2" height="2" fill="currentColor"/><rect x="2.5" y="8" width="2" height="2" fill="currentColor"/><rect x="11.5" y="8" width="2" height="2" fill="currentColor"/></svg>
    <div class="ttp">Toma simple (3)</div>
  </button>
  <button class="tb" id="t-toma-d" onclick="setTool('toma-d')">
    <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 9 A5 5 0 0 1 13 9" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="9" x2="15" y2="9" stroke="currentColor" stroke-width="1.5"/><rect x="7" y="1.5" width="2" height="2" fill="currentColor"/><rect x="7" y="3.8" width="2" height="2" fill="currentColor"/><rect x="2.5" y="8" width="2" height="2" fill="currentColor"/><rect x="11.5" y="8" width="2" height="2" fill="currentColor"/></svg>
    <div class="ttp">Toma doble (4)</div>
  </button>
  <button class="tb" id="t-tecla-s" onclick="setTool('tecla-s')">
    <svg width="16" height="16" viewBox="0 0 16 16"><line x1="1" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="10" x2="13" y2="4" stroke="currentColor" stroke-width="1.5"/><line x1="13" y1="4" x2="13" y2="7" stroke="currentColor" stroke-width="1.5"/></svg>
    <div class="ttp">Tecla simple (5)</div>
  </button>
  <button class="tb" id="t-tecla-d" onclick="setTool('tecla-d')">
    <svg width="16" height="16" viewBox="0 0 16 16"><line x1="1" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="10" x2="13" y2="4" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="4" x2="12" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="14" y1="5.5" x2="14" y2="8.5" stroke="currentColor" stroke-width="1.5"/></svg>
    <div class="ttp">Tecla doble (6)</div>
  </button>
  <button class="tb" id="t-tecla-t" onclick="setTool('tecla-t')">
    <svg width="16" height="16" viewBox="0 0 16 16"><line x1="1" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="8" y1="10" x2="12" y2="4" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="4" x2="10" y2="7" stroke="currentColor" stroke-width="1.5"/><line x1="12.5" y1="5" x2="12.5" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="15" y1="6" x2="15" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>
    <div class="ttp">Tecla triple (7)</div>
  </button>
  <button class="tb" id="t-tecla-de" onclick="setTool('tecla-de')">
    <svg width="16" height="16" viewBox="0 0 16 16"><line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="13" x2="11" y2="3" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="3" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="10" x2="5" y2="13" stroke="currentColor" stroke-width="1.5"/></svg>
    <div class="ttp">Tecla doble efecto (8)</div>
  </button>
  <button class="tb" id="t-tablero" onclick="setTool('tablero')">
    <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="5" width="14" height="6" fill="none" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="5" x2="15" y2="11" stroke="currentColor" stroke-width="1.1"/><line x1="15" y1="5" x2="1" y2="11" stroke="currentColor" stroke-width="1.1"/></svg>
    <div class="ttp">Tablero AEA (9)</div>
  </button>
  <button class="tb" id="t-fan-e" onclick="setTool('fan-e')">

<script>
'use strict';
// ── CANVAS ───────────────────────────────────────────────────────────
const cva=document.getElementById('cv-area');
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

// ── DATOS ────────────────────────────────────────────────────────────
let walls=[],boxes=[],pipes=[],dims=[];
let wId=1,bId=1,pId=1,dId=1;

// ── VISTA ────────────────────────────────────────────────────────────
let scale=50,gridCm=25,zoom=1,panX=0,panY=0;
let panning=false,pSX=0,pSY=0,pPX=0,pPY=0;
let layers={walls:2,pipes:2,elec:2,wires:2,dims:2}; // 2=visible 1=atenuado 0=oculto

// ── HERRAMIENTA ──────────────────────────────────────────────────────
let tool='sel';

// ── DIBUJO PARED ─────────────────────────────────────────────────────
let wDraw={on:false,start:null};

// ── DIBUJO CORRUGADO ─────────────────────────────────────────────────
let pipeDraw={on:false,fromBox:null,fromKO:null,pts:[]};

// ── EDICIÓN CORRUGADO ────────────────────────────────────────────────
let pipeEdit={seg:null,ptIdx:-1,dragging:false};

// ── ARRASTRE CAJA ────────────────────────────────────────────────────
let boxDrag={on:false,box:null,offX:0,offY:0};

// ── DIBUJO COTA ──────────────────────────────────────────────────────
let dimDraw={phase:0,p1:null,p2:null};

// ── SELECCIÓN ────────────────────────────────────────────────────────
let selBox=null,selPipe=null,selWall=null,selDim=null;

// ── UNDO ─────────────────────────────────────────────────────────────
let undoStack=[],dirty=false;

// ── MOUSE ────────────────────────────────────────────────────────────
let mouseW={x:0,y:0};
let snapKO=null;
let snapAnchor=null; // snap al punto de anclaje de un símbolo AEA
let lastHoverT=0;

// ── PANEL ────────────────────────────────────────────────────────────
let rpTab='cfg';

// ── SIMBOLOGÍA AEA ───────────────────────────────────────────────────
let elecSyms=[];   // símbolos colocados
let elecWires=[];  // conductores entre símbolos
let esId=1,ewId=1;

// Circuitos definidos por el usuario
let circuits=[
  {id:1,name:'C1 - Iluminación',color:'#ff4444',amp:10},
  {id:2,name:'C2 - Tomacorrientes',color:'#4488ff',amp:16},
  {id:3,name:'C3 - AC',color:'#ff8800',amp:20},
];
let circuitIdCtr=4;
let activeCircuitId=1; // circuito activo al colocar símbolos

// Dibujo de conductor AEA
let wireDraw={on:false,pts:[],type:'solid',fromSymId:null};

// Edición de conductor
let wireEdit={seg:null,ptIdx:-1,dragging:false};

// Selección de símbolo/conductor
let selSym=null,selEWire=null;

// Edición de etiqueta
let editingLabel=null;

// ═══════════════════════════════════════════════════════════════════════
// COORDENADAS
// ═══════════════════════════════════════════════════════════════════════
function pxCm(){return zoom*2*(scale/50);}
function w2s(x,y){return{x:panX+x*pxCm(),y:panY+y*pxCm()};}
function s2w(x,y){return{x:(x-panX)/pxCm(),y:(y-panY)/pxCm()};}
function sg(x,y){const g=gridCm;return{x:Math.round(x/g)*g,y:Math.round(y/g)*g};}
function msPt(e){const r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function mwPt(e){const s=msPt(e);return s2w(s.x,s.y);}
function D(ax,ay,bx,by){return Math.sqrt((bx-ax)**2+(by-ay)**2);}

// ═══════════════════════════════════════════════════════════════════════
// CAJAS: TAMAÑOS, KNOCKOUTS, SNAP
// ═══════════════════════════════════════════════════════════════════════
const BOX_SIZES={oct:{w:8,h:8},rct:{w:10,h:5.7},tab:{w:20,h:40}};
function nLabel(t){return{oct:'Caja oct.',rct:'Caja rect.',tab:'Tablero'}[t]||t;}

function getKOs(type){
  const s=BOX_SIZES[type];
  const hw=s.w/2,hh=s.h/2;
  if(type==='oct'){
    const r=hw*0.85;
    return Array.from({length:8},(_,i)=>{const a=i*Math.PI/4-Math.PI/8;return{lx:r*Math.cos(a),ly:r*Math.sin(a),angle:a,idx:i};});
  }
  if(type==='rct'){
    return[
      {lx:-hw*0.35,ly:-hh,angle:-Math.PI/2,idx:0},
      {lx: hw*0.35,ly:-hh,angle:-Math.PI/2,idx:1},
      {lx:-hw,    ly:0,  angle:Math.PI,   idx:2},
      {lx: hw,    ly:0,  angle:0,         idx:3},
    ];
  }
  return[
    {lx:-hw*0.4,ly:-hh,angle:-Math.PI/2,idx:0},{lx:hw*0.4,ly:-hh,angle:-Math.PI/2,idx:1},
    {lx:-hw,ly:-hh*0.3,angle:Math.PI,idx:2},{lx:-hw,ly:hh*0.3,angle:Math.PI,idx:3},
    {lx:hw,ly:-hh*0.3,angle:0,idx:4},{lx:hw,ly:hh*0.3,angle:0,idx:5},
    {lx:-hw*0.4,ly:hh,angle:Math.PI/2,idx:6},{lx:hw*0.4,ly:hh,angle:Math.PI/2,idx:7},
  ];
}

function koWorld(box,ko){
  const r=box.rot||0,c=Math.cos(r),s=Math.sin(r);
  return{x:box.x+ko.lx*c-ko.ly*s,y:box.y+ko.lx*s+ko.ly*c};
}

function koConnPos(box,ko,out=1.9){
  const r=box.rot||0,a=ko.angle+r,kp=koWorld(box,ko);
  return{x:kp.x+Math.cos(a)*out/2,y:kp.y+Math.sin(a)*out/2};
}

function findSnapKO(wx,wy,rCm=3){
  let best=null,bd=rCm*rCm;
  for(const box of boxes){
    for(const ko of getKOs(box.type)){
      const kp=koWorld(box,ko);
      const d=(kp.x-wx)**2+(kp.y-wy)**2;
      if(d<bd){bd=d;best={box,ko,wx:kp.x,wy:kp.y};}
    }
  }
  return best;
}

function findSnapWE(wx,wy,rCm=2){
  let best=null,bd=rCm*rCm;
  for(const w of walls){
    for(const p of[{x:w.x1,y:w.y1},{x:w.x2,y:w.y2}]){
      const d=(p.x-wx)**2+(p.y-wy)**2;
      if(d<bd){bd=d;best=p;}
    }
  }
  return best;
}

// Snap al punto de anclaje de un símbolo AEA
function findSnapAnchor(wx,wy,rCm=4){
  let best=null,bd=rCm*rCm;
  for(const sym of elecSyms){
    const ap=symAnchorWorld(sym);
    const d=(ap.x-wx)**2+(ap.y-wy)**2;
    if(d<bd){bd=d;best={sym,wx:ap.x,wy:ap.y};}
  }
  return best;
}

// ═══════════════════════════════════════════════════════════════════════
// HIT TEST
// ═══════════════════════════════════════════════════════════════════════
function hitBox(wx,wy){
  for(let i=boxes.length-1;i>=0;i--){
    const b=boxes[i],s=BOX_SIZES[b.type];
    if(Math.abs(wx-b.x)<=s.w/2+0.5&&Math.abs(wy-b.y)<=s.h/2+0.5)return b;
  }return null;
}
function hitWall(wx,wy){
  const tol=0.8;
  for(let i=walls.length-1;i>=0;i--){
    const w=walls[i],dx=w.x2-w.x1,dy=w.y2-w.y1,l2=dx*dx+dy*dy;
    if(!l2)continue;
    const t=Math.max(0,Math.min(1,((wx-w.x1)*dx+(wy-w.y1)*dy)/l2));
    if((wx-w.x1-t*dx)**2+(wy-w.y1-t*dy)**2<tol*tol)return w;
  }return null;
}
function hitPipe(wx,wy){
  const tol=0.8;
  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i],allPts=pipeAllPts(p);
    for(let j=1;j<allPts.length;j++){
      const a=allPts[j-1],b=allPts[j],dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
      if(!l2)continue;
      const t=Math.max(0,Math.min(1,((wx-a.x)*dx+(wy-a.y)*dy)/l2));
      if((wx-a.x-t*dx)**2+(wy-a.y-t*dy)**2<tol*tol)return p;
    }
  }return null;
}
function hitPipeCP(wx,wy,pipe){
  for(let i=0;i<pipe.ctrlPts.length;i++){
    const p=pipe.ctrlPts[i];
    if((wx-p.x)**2+(wy-p.y)**2<1.8*1.8)return i;
  }return -1;
}
function hitDim(wx,wy){
  const tol=1.2;
  for(let i=dims.length-1;i>=0;i--){
    const d=dims[i],dx=d.p2.x-d.p1.x,dy=d.p2.y-d.p1.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len,ny=dx/len;
    const lx1=d.p1.x+nx*d.offset,ly1=d.p1.y+ny*d.offset;
    const lx2=d.p2.x+nx*d.offset,ly2=d.p2.y+ny*d.offset;
    const ddx=lx2-lx1,ddy=ly2-ly1,l2=ddx*ddx+ddy*ddy;
    if(!l2)continue;
    const t=Math.max(0,Math.min(1,((wx-lx1)*ddx+(wy-ly1)*ddy)/l2));
    if((wx-lx1-t*ddx)**2+(wy-ly1-t*ddy)**2<tol*tol)return d;
  }return null;
}

// ═══════════════════════════════════════════════════════════════════════
// SPLINE CATMULL-ROM
// ═══════════════════════════════════════════════════════════════════════
function pipeAllPts(pipe){
  const pts=[];
  if(pipe.fromPos)pts.push(pipe.fromPos);
  pts.push(...pipe.ctrlPts);
  if(pipe.toPos)pts.push(pipe.toPos);
  return pts;
}

function catmullPath(pts){
  if(pts.length<2)return null;
  const path=new Path2D();
  if(pts.length===2){
    const a=w2s(pts[0].x,pts[0].y),b=w2s(pts[1].x,pts[1].y);
    path.moveTo(a.x,a.y);path.lineTo(b.x,b.y);return path;
  }
  const ex=[pts[0],...pts,pts[pts.length-1]];
  const s0=w2s(ex[1].x,ex[1].y);path.moveTo(s0.x,s0.y);
  for(let i=1;i<ex.length-2;i++){
    const s1=w2s(ex[i].x,ex[i].y),s2=w2s(ex[i+1].x,ex[i+1].y);
    const s_1=w2s(ex[i-1].x,ex[i-1].y),s3=w2s(ex[i+2].x,ex[i+2].y);
    const cp1x=s1.x+(s2.x-s_1.x)/6,cp1y=s1.y+(s2.y-s_1.y)/6;
    const cp2x=s2.x-(s3.x-s1.x)/6,cp2y=s2.y-(s3.y-s1.y)/6;
    path.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,s2.x,s2.y);
  }
  return path;
}

function splineLen(pts,N=40){
  if(pts.length<2)return 0;
  const ex=[pts[0],...pts,pts[pts.length-1]];
  let total=0,prev=null;
  for(let seg=1;seg<ex.length-2;seg++){
    const p0=ex[seg-1],p1=ex[seg],p2=ex[seg+1],p3=ex[seg+2];
    for(let k=0;k<=N;k++){
      const t=k/N,t2=t*t,t3=t2*t;
      const x=.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3);
      const y=.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3);
      if(prev)total+=D(prev.x,prev.y,x,y);
      prev={x,y};
    }
  }
  return total;
}

function pipeLen(pipe){return(splineLen(pipeAllPts(pipe))/100).toFixed(2);}
function wallLenM(w){return(D(w.x1,w.y1,w.x2,w.y2)/100).toFixed(2);}

// ═══════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  drawGrid();
  drawOrigin();
  const wa=layerAlpha('walls');
  if(wa>0){ctx.globalAlpha=wa;if(wa<1)ctx.filter='grayscale(100%) brightness(1.6)';drawWalls();ctx.filter='none';ctx.globalAlpha=1;}
  const pa=layerAlpha('pipes');
  if(pa>0){ctx.globalAlpha=pa;if(pa<1)ctx.filter='grayscale(100%) brightness(1.8)';drawPipes();drawBoxes();drawPipePreview();ctx.filter='none';ctx.globalAlpha=1;}
  const ea=layerAlpha('elec');
  if(ea>0){ctx.globalAlpha=ea;if(ea<1)ctx.filter='grayscale(100%) brightness(1.6)';drawElecSyms();ctx.filter='none';ctx.globalAlpha=1;}
  const wra=layerAlpha('wires');
  if(wra>0){ctx.globalAlpha=wra;if(wra<1)ctx.filter='grayscale(100%) brightness(1.8)';drawElecWires();drawWirePreview();ctx.filter='none';ctx.globalAlpha=1;}
  const da=layerAlpha('dims');
  if(da>0){ctx.globalAlpha=da;drawDims();drawDimPreview();ctx.globalAlpha=1;}
}

function drawGrid(){
  const g=gridCm*pxCm();
  ctx.strokeStyle='rgba(255,255,255,.035)';ctx.lineWidth=.5;
  const ox=((panX%g)+g)%g,oy=((panY%g)+g)%g;
  for(let x=ox;x<cv.width;x+=g){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
  for(let y=oy;y<cv.height;y+=g){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}
  const M=g*4;ctx.strokeStyle='rgba(255,255,255,.065)';
  const mx=((panX%M)+M)%M,my=((panY%M)+M)%M;
  for(let x=mx;x<cv.width;x+=M){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,cv.height);ctx.stroke();}
  for(let y=my;y<cv.height;y+=M){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cv.width,y);ctx.stroke();}
}

function drawOrigin(){
  const o=w2s(0,0);ctx.save();ctx.globalAlpha=.15;ctx.strokeStyle='#00c8ff';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(o.x-16,o.y);ctx.lineTo(o.x+16,o.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(o.x,o.y-16);ctx.lineTo(o.x,o.y+16);ctx.stroke();ctx.restore();
}

function drawWalls(){
  for(const w of walls){
    const s1=w2s(w.x1,w.y1),s2=w2s(w.x2,w.y2);
    const dx=s2.x-s1.x,dy=s2.y-s1.y,len=Math.sqrt(dx*dx+dy*dy);
    if(len<.5)continue;
    const thPx=w.thick*pxCm();
    const nx=-dy/len*thPx/2,ny=dx/len*thPx/2;
    const isSel=selWall&&selWall.id===w.id;
    const path=new Path2D();
    path.moveTo(s1.x+nx,s1.y+ny);path.lineTo(s2.x+nx,s2.y+ny);
    path.lineTo(s2.x-nx,s2.y-ny);path.lineTo(s1.x-nx,s1.y-ny);path.closePath();
    ctx.fillStyle=isSel?'rgba(0,200,255,.16)':'rgba(200,210,230,.82)';ctx.fill(path);
    ctx.strokeStyle=isSel?'#00c8ff':'rgba(140,158,185,.85)';ctx.lineWidth=isSel?1.5:.7;ctx.stroke(path);
    if(len>55){
      const mmx=(s1.x+s2.x)/2,mmy=(s1.y+s2.y)/2;
      ctx.save();ctx.translate(mmx,mmy);let a=Math.atan2(dy,dx);if(a>Math.PI/2||a<-Math.PI/2)a+=Math.PI;ctx.rotate(a);
      ctx.fillStyle=isSel?'#00c8ff':'rgba(170,185,205,.8)';ctx.font='9px monospace';ctx.textAlign='center';
      ctx.fillText(`${wallLenM(w)} m`,0,-thPx/2-4);ctx.restore();
    }
    const dc=isSel?'#00c8ff':'rgba(140,158,185,.5)';
    [s1,s2].forEach(p=>{ctx.fillStyle=dc;ctx.beginPath();ctx.arc(p.x,p.y,isSel?4:2.5,0,Math.PI*2);ctx.fill();});
  }
  // Preview pared
  if(wDraw.on&&wDraw.start){
    let ex=mouseW.x,ey=mouseW.y;
    if(!document.getElementById('freeA')?.checked){const c=constrA(ex,ey,wDraw.start.x,wDraw.start.y);ex=c.x;ey=c.y;}
    const p1=w2s(wDraw.start.x,wDraw.start.y),p2=w2s(ex,ey);
    const dx=p2.x-p1.x,dy=p2.y-p1.y,ll=Math.sqrt(dx*dx+dy*dy);
    if(ll>.5){
      const thPx=getThickCm()*pxCm();
      const nx=-dy/ll*thPx/2,ny=dx/ll*thPx/2;
      ctx.save();ctx.fillStyle='rgba(0,200,255,.1)';ctx.strokeStyle='rgba(0,200,255,.55)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
      const pp=new Path2D();pp.moveTo(p1.x+nx,p1.y+ny);pp.lineTo(p2.x+nx,p2.y+ny);pp.lineTo(p2.x-nx,p2.y-ny);pp.lineTo(p1.x-nx,p1.y-ny);pp.closePath();
      ctx.fill(pp);ctx.stroke(pp);ctx.setLineDash([]);
      const wl=D(wDraw.start.x,wDraw.start.y,ex,ey)/100;
      ctx.fillStyle='#00c8ff';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText(`${wl.toFixed(2)} m`,(p1.x+p2.x)/2,(p1.y+p2.y)/2-thPx/2-6);ctx.restore();
    }
  }
}

function drawBoxes(){
  const pxcm=pxCm(),showDetail=zoom>1.5;
  for(const box of boxes){
    const c=w2s(box.x,box.y);
    const s=BOX_SIZES[box.type];
    const hw=s.w*pxcm/2,hh=s.h*pxcm/2;
    const isSel=selBox&&selBox.id===box.id;
    const rot=box.rot||0;
    const col=box.type==='tab'?'#00c8ff':'#f5a623';
    ctx.save();ctx.translate(c.x,c.y);ctx.rotate(rot);
    if(box.type==='oct'){
      ctx.beginPath();
      for(let i=0;i<8;i++){const a=i*Math.PI/4-Math.PI/8;i===0?ctx.moveTo(hw*Math.cos(a),hh*Math.sin(a)):ctx.lineTo(hw*Math.cos(a),hh*Math.sin(a));}
      ctx.closePath();
      ctx.fillStyle=isSel?'rgba(245,166,35,.22)':'rgba(245,166,35,.1)';ctx.fill();
      ctx.strokeStyle=isSel?'#ffe066':'#f5a623';ctx.lineWidth=isSel?2:1.4;ctx.stroke();
    }else{
      ctx.fillStyle=isSel?(box.type==='tab'?'rgba(0,200,255,.22)':'rgba(245,166,35,.22)'):(box.type==='tab'?'rgba(0,200,255,.1)':'rgba(245,166,35,.1)');
      ctx.fillRect(-hw,-hh,hw*2,hh*2);
      ctx.strokeStyle=isSel?'#ffe066':col;ctx.lineWidth=isSel?2:1.4;
      ctx.strokeRect(-hw,-hh,hw*2,hh*2);
      if(box.type==='tab'&&hw>10){ctx.fillStyle=isSel?'#00c8ff':'#007a9e';ctx.font=`bold ${Math.min(10,hw/3)}px monospace`;ctx.textAlign='center';ctx.fillText('TAB',0,4);}
      // Línea de referencia top
      ctx.strokeStyle='rgba(245,166,35,.2)';ctx.lineWidth=.7;ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.moveTo(-hw*.6,-hh*.5);ctx.lineTo(hw*.6,-hh*.5);ctx.stroke();ctx.setLineDash([]);
    }
    // KOs
    const kos=getKOs(box.type);
    if(showDetail){
      const koR=0.95*pxcm;
      for(const ko of kos){
        const kx=ko.lx*pxcm,ky=ko.ly*pxcm;
        ctx.beginPath();ctx.arc(kx,ky,koR,0,Math.PI*2);ctx.fillStyle='rgba(15,17,23,.7)';ctx.fill();ctx.strokeStyle='rgba(120,130,150,.6)';ctx.lineWidth=.8;ctx.stroke();
        const cx2=kx+Math.cos(ko.angle)*koR*1.1,cy2=ky+Math.sin(ko.angle)*koR*1.1;
        ctx.beginPath();ctx.arc(cx2,cy2,koR*.85,0,Math.PI*2);ctx.fillStyle='rgba(180,160,100,.18)';ctx.fill();ctx.strokeStyle=isSel?'#ffe066':'rgba(200,180,80,.7)';ctx.lineWidth=1;ctx.stroke();
        const ts=koR*.45;ctx.strokeStyle='rgba(150,140,90,.8)';ctx.lineWidth=.7;
        ctx.beginPath();ctx.moveTo(cx2-ts,cy2);ctx.lineTo(cx2+ts,cy2);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cx2,cy2-ts);ctx.lineTo(cx2,cy2+ts);ctx.stroke();
      }
    }else{
      for(const ko of kos){ctx.fillStyle=isSel?'#ffe066':'rgba(245,166,35,.7)';ctx.beginPath();ctx.arc(ko.lx*pxcm,ko.ly*pxcm,2.5,0,Math.PI*2);ctx.fill();}
    }
    if(isSel&&rot!==0){ctx.fillStyle='rgba(255,230,80,.8)';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(`${Math.round(rot*180/Math.PI)}°`,0,hh+16);}
    ctx.restore();
    // Etiqueta (sin rotar)
    ctx.fillStyle=isSel?'#fff':'rgba(190,205,225,.6)';ctx.font='8px monospace';ctx.textAlign='center';
    const lr=Math.sqrt(hw*hw+hh*hh);
    ctx.fillText(nLabel(box.type),c.x,c.y+lr+11);
  }
  // Snap KO highlight
  if(snapKO&&(tool==='pipe'||pipeDraw.on)){
    const ks=w2s(snapKO.wx,snapKO.wy);
    ctx.save();ctx.strokeStyle='#00e87a';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ks.x,ks.y,8,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

function drawPipes(){
  for(const pipe of pipes){
    const allPts=pipeAllPts(pipe);if(allPts.length<2)continue;
    const isSel=selPipe&&selPipe.id===pipe.id;
    const path=catmullPath(allPts);if(!path)continue;
    ctx.save();
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke(path);
    ctx.strokeStyle=isSel?'#ffe066':'#f5a623';ctx.lineWidth=isSel?3.5:2.5;ctx.setLineDash([]);ctx.stroke(path);
    ctx.strokeStyle=isSel?'rgba(255,230,80,.25)':'rgba(160,70,0,.28)';ctx.lineWidth=isSel?6:5;ctx.setLineDash([5,7]);ctx.stroke(path);
    ctx.setLineDash([]);
    // Etiqueta
    const mid=allPts[Math.floor(allPts.length/2)];const ms=w2s(mid.x,mid.y);
    const lm=pipeLen(pipe);const tw=lm.length*6+18;
    ctx.fillStyle='rgba(15,17,23,.9)';ctx.fillRect(ms.x-tw/2,ms.y-10,tw,15);
    ctx.strokeStyle=isSel?'rgba(255,230,80,.4)':'rgba(245,166,35,.35)';ctx.lineWidth=.5;ctx.strokeRect(ms.x-tw/2,ms.y-10,tw,15);
    ctx.fillStyle=isSel?'#ffe066':'#f5a623';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(`${lm} m`,ms.x,ms.y+1);
    // Puntos control
    if(isSel){
      for(let i=0;i<pipe.ctrlPts.length;i++){
        const pt=pipe.ctrlPts[i],ps=w2s(pt.x,pt.y);
        ctx.fillStyle='rgba(255,230,80,.9)';ctx.strokeStyle='rgba(15,17,23,.8)';ctx.lineWidth=1.2;
        ctx.beginPath();ctx.arc(ps.x,ps.y,5,0,Math.PI*2);ctx.fill();ctx.stroke();
      }
      [allPts[0],allPts[allPts.length-1]].forEach(pt=>{const ps=w2s(pt.x,pt.y);ctx.fillStyle='rgba(0,200,255,.8)';ctx.beginPath();ctx.arc(ps.x,ps.y,4,0,Math.PI*2);ctx.fill();});
    }else{
      [allPts[0],allPts[allPts.length-1]].forEach(pt=>{const ps=w2s(pt.x,pt.y);ctx.fillStyle='rgba(245,166,35,.6)';ctx.beginPath();ctx.arc(ps.x,ps.y,3,0,Math.PI*2);ctx.fill();});
    }
    ctx.restore();
  }
}

function drawPipePreview(){
  if(!pipeDraw.on||pipeDraw.pts.length<1)return;
  const cur=snapKO?{x:snapKO.wx,y:snapKO.wy}:mouseW;
  const allPts=[...pipeDraw.pts,cur];
  const path=catmullPath(allPts);
  ctx.save();ctx.strokeStyle='rgba(245,166,35,.45)';ctx.lineWidth=2;ctx.setLineDash([5,4]);ctx.lineCap='round';
  if(path)ctx.stroke(path);ctx.setLineDash([]);
  const lm=(splineLen(allPts)/100).toFixed(2);
  const last=allPts[allPts.length-2]||allPts[0];
  const ms=w2s((last.x+cur.x)/2,(last.y+cur.y)/2);
  ctx.fillStyle='rgba(245,166,35,.9)';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(`${lm} m`,ms.x,ms.y-10);
  pipeDraw.pts.slice(1).forEach(pt=>{const ps=w2s(pt.x,pt.y);ctx.fillStyle='rgba(245,166,35,.7)';ctx.beginPath();ctx.arc(ps.x,ps.y,4,0,Math.PI*2);ctx.fill();});
  if(pipeDraw.pts[0]){const ps=w2s(pipeDraw.pts[0].x,pipeDraw.pts[0].y);ctx.fillStyle='#00e87a';ctx.beginPath();ctx.arc(ps.x,ps.y,5,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

// ── COTAS ────────────────────────────────────────────────────────────
function calcOffset(p1,p2,cur){
  const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len;
  const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2;
  return(cur.x-mx)*nx+(cur.y-my)*ny;
}

function drawOneDim(d,isSel,preview=false){
  const p1=w2s(d.p1.x,d.p1.y),p2=w2s(d.p2.x,d.p2.y);
  const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len,ny=dx/len;
  const off=d.offset*pxCm();
  const c1={x:p1.x+nx*off,y:p1.y+ny*off},c2={x:p2.x+nx*off,y:p2.y+ny*off};
  const col=isSel?'#00c8ff':preview?'rgba(0,200,255,.55)':'rgba(160,200,255,.82)';
  const extDir=off>=0?1:-1,extLen=8;
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=isSel?1.5:1;
  // Líneas extensión
  ctx.beginPath();ctx.moveTo(p1.x+nx*off*.2,p1.y+ny*off*.2);ctx.lineTo(c1.x+nx*extLen*extDir,c1.y+ny*extLen*extDir);ctx.stroke();
  ctx.beginPath();ctx.moveTo(p2.x+nx*off*.2,p2.y+ny*off*.2);ctx.lineTo(c2.x+nx*extLen*extDir,c2.y+ny*extLen*extDir);ctx.stroke();
  // Línea cota
  ctx.beginPath();ctx.moveTo(c1.x,c1.y);ctx.lineTo(c2.x,c2.y);ctx.stroke();
  // Flechas
  const ang=Math.atan2(dy,dx),al=8,aa=0.38;
  [[c1,1],[c2,-1]].forEach(([p,dir])=>{
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+dir*al*Math.cos(ang+aa),p.y+dir*al*Math.sin(ang+aa));ctx.stroke();
    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+dir*al*Math.cos(ang-aa),p.y+dir*al*Math.sin(ang-aa));ctx.stroke();
  });
  // Texto
  const realLen=(D(d.p1.x,d.p1.y,d.p2.x,d.p2.y)/100).toFixed(2);
  const label=`${realLen} m`;
  const mx=(c1.x+c2.x)/2,my=(c1.y+c2.y)/2;
  let ta=Math.abs(ang)>Math.PI/2?ang+Math.PI:ang;
  ctx.save();ctx.translate(mx,my);ctx.rotate(ta);
  const tw=label.length*6+8;
  ctx.fillStyle='rgba(10,13,20,.9)';ctx.fillRect(-tw/2,-11,tw,14);
  ctx.fillStyle=isSel?'#00c8ff':preview?'rgba(0,200,255,.8)':'rgba(200,220,255,.9)';
  ctx.font=`${isSel?'bold ':''}10px monospace`;ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText(label,0,0);ctx.restore();
  if(isSel){[c1,c2].forEach(p=>{ctx.fillStyle='rgba(0,200,255,.7)';ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();});}
  ctx.restore();
}

function drawDims(){
  for(const d of dims)drawOneDim(d,selDim&&selDim.id===d.id);
}

function drawDimPreview(){
  if(tool!=='dim')return;
  if(dimDraw.phase===1&&dimDraw.p1){
    const s1=w2s(dimDraw.p1.x,dimDraw.p1.y);
    const s2=w2s(mouseW.x,mouseW.y);
    // Línea de preview
    ctx.save();
    ctx.strokeStyle='rgba(0,200,255,.5)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(s1.x,s1.y);ctx.lineTo(s2.x,s2.y);ctx.stroke();
    ctx.setLineDash([]);
    // Punto de origen
    ctx.fillStyle='#00c8ff';ctx.beginPath();ctx.arc(s1.x,s1.y,3.5,0,Math.PI*2);ctx.fill();
    // MEDIDA EN TIEMPO REAL — esto es lo nuevo
    const realLen=(D(dimDraw.p1.x,dimDraw.p1.y,mouseW.x,mouseW.y)/100).toFixed(2);
    const mx=(s1.x+s2.x)/2,my=(s1.y+s2.y)/2;
    const tw=realLen.length*7+24;
    ctx.fillStyle='rgba(0,200,255,.92)';
    ctx.beginPath();ctx.roundRect?ctx.roundRect(mx-tw/2,my-11,tw,16,3):ctx.rect(mx-tw/2,my-11,tw,16);
    ctx.fill();
    ctx.fillStyle='#0a0d14';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText(`${realLen} m`,mx,my+1);
    // Punto destino (cursor)
    ctx.fillStyle='rgba(0,200,255,.5)';ctx.beginPath();ctx.arc(s2.x,s2.y,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  if(dimDraw.phase===2&&dimDraw.p1&&dimDraw.p2){
    drawOneDim({id:-1,p1:{...dimDraw.p1},p2:{...dimDraw.p2},offset:calcOffset(dimDraw.p1,dimDraw.p2,mouseW)},false,true);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// SIMBOLOGÍA AEA — DIBUJO DE SÍMBOLOS
// ═══════════════════════════════════════════════════════════════════════

// Radio base de los símbolos en cm (a escala 1:50)
const SYM_R=6; // 6cm radio → 12cm diámetro real

function getCircuit(id){return circuits.find(c=>c.id===id)||{color:'#aaa',name:'?'};}

// Punto de anclaje de cada tipo de símbolo (en coords locales, antes de rotar)
// Es el punto desde donde sale el conductor
function symAnchorLocal(type){
  const r=SYM_R;
  // Símbolos de techo: anclaje abajo del símbolo
  if(type==='luz')   return{x:0,y:r};
  if(type==='tablero') return{x:0,y:0};
  // Símbolos de pared: anclaje en el punto de la pared (abajo del símbolo)
  if(type==='luz-p') return{x:0,y:r*1.8};  // donde toca la pared
  if(type==='toma-s') return{x:0,y:0};      // centro (punto de anclaje)
  if(type==='toma-d') return{x:0,y:0};
  if(type==='tecla-s') return{x:0,y:0};     // en la pared
  if(type==='tecla-d') return{x:0,y:0};
  if(type==='tecla-t') return{x:0,y:0};
  if(type==='tecla-de') return{x:0,y:0};    // tecla doble efecto
  if(type==='fan-e') return{x:0,y:r};
  return{x:0,y:0};
}

// Punto de anclaje en world coords (respeta rotación)
function symAnchorWorld(sym){
  const al=symAnchorLocal(sym.type);
  const rot=sym.rot||0;
  const c=Math.cos(rot),s=Math.sin(rot);
  return{
    x:sym.x+al.x*c-al.y*s,
    y:sym.y+al.x*s+al.y*c
  };
}

// Dibuja el punto de anclaje
function drawAnchor(px,py,col,selected){
  ctx.save();
  ctx.strokeStyle=selected?'#fff':col;
  ctx.fillStyle='rgba(15,17,23,.85)';
  ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);
  ctx.fill();ctx.stroke();
  ctx.restore();
}

// Dibuja un símbolo AEA según tus imágenes
function drawSymbol(type,cx,cy,col,rot,selected){
  const s=w2s(cx,cy);
  const r=SYM_R*pxCm();
  const lw=selected?2:1.5;
  ctx.save();
  ctx.translate(s.x,s.y);
  ctx.rotate(rot||0);
  ctx.strokeStyle=col;ctx.fillStyle=col;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';

  if(type==='luz'){
    // Círculo con X adentro
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*.7,-r*.7);ctx.lineTo(r*.7,r*.7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.7,-r*.7);ctx.lineTo(-r*.7,r*.7);ctx.stroke();
    // Punto de anclaje abajo
    drawAnchor(0,r,col,selected);
  }
  else if(type==='tablero'){
    // Rectángulo horizontal con X adentro
    const hw=r*1.6,hh=r*.65;
    ctx.beginPath();ctx.rect(-hw,-hh,hw*2,hh*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-hw,-hh);ctx.lineTo(hw,hh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hw,-hh);ctx.lineTo(-hw,hh);ctx.stroke();
  }
  else if(type==='luz-p'){
    // Igual que luz + línea vertical hacia la pared abajo + línea de pared
    ctx.beginPath();ctx.arc(0,-r*.9,r,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-r*.7,-r*.9-r*.7);ctx.lineTo(r*.7,-r*.9+r*.7);ctx.stroke();
    ctx.beginPath();ctx.moveTo(r*.7,-r*.9-r*.7);ctx.lineTo(-r*.7,-r*.9+r*.7);ctx.stroke();
    // Línea vertical de bajada
    ctx.beginPath();ctx.moveTo(0,-r*.9+r);ctx.lineTo(0,r*.7);ctx.stroke();
    // Línea de pared (horizontal con rayado)
    ctx.lineWidth=lw+.5;
    ctx.beginPath();ctx.moveTo(-r*1.6,r*.7);ctx.lineTo(r*1.6,r*.7);ctx.stroke();
    ctx.lineWidth=lw*.6;ctx.globalAlpha=.5;
    for(let i=-5;i<=5;i++){
      ctx.beginPath();ctx.moveTo(i*r*.28,r*.7);ctx.lineTo(i*r*.28+r*.2,r*1.2);ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.lineWidth=lw;
    // Punto de anclaje donde toca la pared
    drawAnchor(0,r*.7,col,selected);
  }
  else if(type==='toma-s'||type==='toma-d'){
    // Semicírculo sobre la pared
    ctx.beginPath();ctx.arc(0,-r*.3,r,Math.PI,0);ctx.stroke();
    // Línea de pared
    ctx.lineWidth=lw+.5;
    ctx.beginPath();ctx.moveTo(-r*1.5,0);ctx.lineTo(r*1.5,0);ctx.stroke();
    ctx.lineWidth=lw*.6;ctx.globalAlpha=.5;
    for(let i=-5;i<=5;i++){
      ctx.beginPath();ctx.moveTo(i*r*.28,0);ctx.lineTo(i*r*.28+r*.2,r*.5);ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.lineWidth=lw;
    // Cuadraditos de contactos
    const sq=r*.22;
    // lateral izquierdo
    ctx.fillRect(-r-sq/2,-sq/2,sq,sq);
    // lateral derecho
    ctx.fillRect(r-sq/2,-sq/2,sq,sq);
    // arriba centro
    ctx.fillRect(-sq/2,-r*.3-r-sq/2,sq,sq);
    // Toma doble: un cuadradito extra arriba
    if(type==='toma-d'){
      ctx.fillRect(-sq/2,-r*.3-r-sq*2,sq,sq);
    }
    // Punto de anclaje en la pared
    drawAnchor(0,0,col,selected);
  }
  else if(type==='tecla-s'||type==='tecla-d'||type==='tecla-t'){
    // Línea diagonal saliendo de la pared hacia arriba-derecha
    const lineLen=r*2.2;
    const angle=-Math.PI/4; // 45° arriba-derecha
    const ex=Math.cos(angle)*lineLen;
    const ey=Math.sin(angle)*lineLen;
    // Línea de pared
    ctx.lineWidth=lw+.5;
    ctx.beginPath();ctx.moveTo(-r*1.5,0);ctx.lineTo(r*1.5,0);ctx.stroke();
    ctx.lineWidth=lw*.6;ctx.globalAlpha=.5;
    for(let i=-5;i<=5;i++){
      ctx.beginPath();ctx.moveTo(i*r*.28,0);ctx.lineTo(i*r*.28+r*.2,r*.5);ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.lineWidth=lw;
    // Línea diagonal principal
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(ex,ey);ctx.stroke();
    // Ganchos perpendiculares a la línea
    const perpAngle=angle+Math.PI/2;
    const gLen=r*.65;
    const numGanchos={tecla_s:1,'tecla-s':1,'tecla-d':2,'tecla-t':3}[type]||1;
    for(let g=0;g<numGanchos;g++){
      const t=0.55+g*0.18;
      const gx=ex*t,gy=ey*t;
      ctx.beginPath();
      ctx.moveTo(gx,gy);
      ctx.lineTo(gx+Math.cos(perpAngle)*gLen,gy+Math.sin(perpAngle)*gLen);
      ctx.stroke();
    }
    // Punto de anclaje en la pared
    drawAnchor(0,0,col,selected);
  }
  else if(type==='tecla-de'){
    // Tecla doble efecto: línea diagonal larga que atraviesa la pared
    // (cruza de abajo-izquierda a arriba-derecha)
    const lineLen=r*2.2;
    const angle=-Math.PI/4;
    const ex=Math.cos(angle)*lineLen,ey=Math.sin(angle)*lineLen;
    const ox=Math.cos(angle+Math.PI)*lineLen*.7,oy=Math.sin(angle+Math.PI)*lineLen*.7;
    // Línea de pared
    ctx.lineWidth=lw+.5;
    ctx.beginPath();ctx.moveTo(-r*1.5,0);ctx.lineTo(r*1.5,0);ctx.stroke();
    ctx.lineWidth=lw*.6;ctx.globalAlpha=.5;
    for(let i=-5;i<=5;i++){
      ctx.beginPath();ctx.moveTo(i*r*.28,0);ctx.lineTo(i*r*.28+r*.2,r*.5);ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.lineWidth=lw;
    // Línea diagonal que atraviesa
    ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ex,ey);ctx.stroke();
    // Gancho arriba
    const perpAngle=angle+Math.PI/2;
    const gLen=r*.65;
    ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex+Math.cos(perpAngle)*gLen,ey+Math.sin(perpAngle)*gLen);ctx.stroke();
    // Gancho abajo
    ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+Math.cos(perpAngle)*gLen,oy+Math.sin(perpAngle)*gLen);ctx.stroke();
    // Punto de anclaje en la pared
    drawAnchor(0,0,col,selected);
  }
  else if(type==='fan-e'){
    // Ventilador: círculo con aspas curvas
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
    const ir=r*.58;
    for(let i=0;i<4;i++){
      const a=i*Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(ir*.15*Math.cos(a),ir*.15*Math.sin(a));
      ctx.quadraticCurveTo(
        ir*Math.cos(a+.5)*1.1,ir*Math.sin(a+.5)*1.1,
        ir*Math.cos(a+Math.PI/2),ir*Math.sin(a+Math.PI/2)
      );
      ctx.stroke();
    }
    ctx.beginPath();ctx.arc(0,0,r*.15,0,Math.PI*2);ctx.fill();
    drawAnchor(0,r,col,selected);
  }

  // Highlight de selección
  if(selected){
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,r+4,0,Math.PI*2);ctx.stroke();
  }

  ctx.restore();
}

function drawElecSyms(){
  if(!elecSyms.length)return;
  for(const sym of elecSyms){
    const circ=getCircuit(sym.circuitId);
    const isSel=selSym&&selSym.id===sym.id;
    drawSymbol(sym.type,sym.x,sym.y,isSel?'#fff':circ.color,sym.rot||0,isSel);
    // Etiqueta
    if(sym.label){
      const s=w2s(sym.x,sym.y);
      const r=SYM_R*pxCm();
      ctx.save();
      ctx.fillStyle=isSel?'#fff':circ.color;
      ctx.font=`${Math.max(8,Math.min(11,r*.6))}px monospace`;
      ctx.textAlign='center';ctx.fillText(sym.label,s.x,s.y+r+14);
      ctx.restore();
    }
    // Punto indicador de circuito (esquina superior derecha)
    if(!isSel){
      const s=w2s(sym.x,sym.y);const r=SYM_R*pxCm();
      ctx.beginPath();ctx.arc(s.x+r*.75,s.y-r*.75,2.5,0,Math.PI*2);
      ctx.fillStyle=circ.color;ctx.fill();
    }
    // Highlight snap al anclaje cuando herramienta conductor activa
    if((tool==='wire-s'||tool==='wire-r')&&!wireDraw.on){
      const ap=symAnchorWorld(sym);const as=w2s(ap.x,ap.y);
      const circ2=getCircuit(sym.circuitId);
      const d=(mouseW.x-ap.x)**2+(mouseW.y-ap.y)**2;
      if(d<(SYM_R*1.5)**2){
        ctx.save();ctx.strokeStyle='#00e87a';ctx.lineWidth=1.8;
        ctx.beginPath();ctx.arc(as.x,as.y,6,0,Math.PI*2);ctx.stroke();ctx.restore();
      }
    }
  }
}

// Conductor AEA (curva Catmull-Rom, sólido o discontinuo)
function drawElecWires(){
  if(!elecWires.length)return;
  for(const ew of elecWires){
    if(ew.pts.length<2)continue;
    const isSel=selEWire&&selEWire.id===ew.id;
    const circ=getCircuit(ew.circuitId);
    const path=catmullPath(ew.pts);if(!path)continue;
    ctx.save();
    ctx.strokeStyle=isSel?'#fff':circ.color;
    ctx.lineWidth=isSel?2:1.5;
    ctx.lineCap='round';ctx.lineJoin='round';
    if(ew.type==='dashed')ctx.setLineDash([6,4]);
    else ctx.setLineDash([]);
    ctx.stroke(path);
    ctx.setLineDash([]);
    // Puntos de control si seleccionado
    if(isSel){
      ew.pts.forEach((pt,i)=>{
        if(i===0||i===ew.pts.length-1)return;
        const ps=w2s(pt.x,pt.y);
        ctx.fillStyle='rgba(255,255,255,.8)';ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(ps.x,ps.y,4.5,0,Math.PI*2);ctx.fill();ctx.stroke();
      });
      // Extremos
      [ew.pts[0],ew.pts[ew.pts.length-1]].forEach(pt=>{
        const ps=w2s(pt.x,pt.y);
        ctx.fillStyle=circ.color;ctx.beginPath();ctx.arc(ps.x,ps.y,3.5,0,Math.PI*2);ctx.fill();
      });
    }
    ctx.restore();
  }
}

// Preview de conductor en dibujo
function drawWirePreview(){
  if(!wireDraw.on||wireDraw.pts.length<1)return;
  // Prioridad snap: anclaje de símbolo > posición del mouse
  const cur=snapAnchor?{x:snapAnchor.wx,y:snapAnchor.wy}:mouseW;
  const allPts=[...wireDraw.pts,cur];
  const path=catmullPath(allPts);
  const circ=getCircuit(activeCircuitId);
  ctx.save();
  ctx.strokeStyle=circ.color;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.globalAlpha=.6;
  if(wireDraw.type==='dashed')ctx.setLineDash([6,4]);
  if(path)ctx.stroke(path);
  ctx.setLineDash([]);ctx.globalAlpha=1;
  // Punto inicial
  const ps=w2s(wireDraw.pts[0].x,wireDraw.pts[0].y);
  ctx.fillStyle=circ.color;ctx.beginPath();ctx.arc(ps.x,ps.y,4,0,Math.PI*2);ctx.fill();
  // Puntos intermedios ya colocados
  wireDraw.pts.slice(1).forEach(pt=>{
    const p=w2s(pt.x,pt.y);
    ctx.fillStyle=circ.color;ctx.globalAlpha=.7;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  });
  ctx.restore();

  // Highlight del snap a anclaje
  if(snapAnchor){
    const as=w2s(snapAnchor.wx,snapAnchor.wy);
    ctx.save();
    ctx.strokeStyle='#00e87a';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(as.x,as.y,7,0,Math.PI*2);ctx.stroke();
    // Cruz de confirmación
    ctx.strokeStyle='#00e87a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(as.x-5,as.y);ctx.lineTo(as.x+5,as.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(as.x,as.y-5);ctx.lineTo(as.x,as.y+5);ctx.stroke();
    ctx.restore();
  }
}

// Hit test símbolos
function hitSym(wx,wy){
  const tol=SYM_R*1.4;
  for(let i=elecSyms.length-1;i>=0;i--){
    const s=elecSyms[i];
    if((wx-s.x)**2+(wy-s.y)**2<tol*tol)return s;
  }return null;
}
function hitEWire(wx,wy){
  const tol=0.8;
  for(let i=elecWires.length-1;i>=0;i--){
    const ew=elecWires[i];const pts=ew.pts;
    for(let j=1;j<pts.length;j++){
      const a=pts[j-1],b=pts[j],dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
      if(!l2)continue;
      const t=Math.max(0,Math.min(1,((wx-a.x)*dx+(wy-a.y)*dy)/l2));
      if((wx-a.x-t*dx)**2+(wy-a.y-t*dy)**2<tol*tol)return ew;
    }
  }return null;
}
function hitEWireCP(wx,wy,ew){
  for(let i=1;i<ew.pts.length-1;i++){
    const p=ew.pts[i];if((wx-p.x)**2+(wy-p.y)**2<1.5*1.5)return i;
  }return -1;
}

// EVENTOS

cv.addEventListener('mousedown',onDown);
cv.addEventListener('mousemove',onMove);

function onCtxMenu(e){
  e.preventDefault();
  if(tool==='wall'&&wDraw.on){wDraw.on=false;wDraw.start=null;render();return;}
  if(tool==='pipe'&&pipeDraw.on){cancelPipeDraw();return;}
  if((tool==='wire-s'||tool==='wire-r')&&wireDraw.on){wireDraw.on=false;wireDraw.pts=[];render();return;}
  if(tool==='dim'){dimDraw.phase=0;dimDraw.p1=null;dimDraw.p2=null;render();return;}
  // Clic derecho sobre caja/símbolo seleccionado → rotar 90°
  if(tool==='sel'){
    const ww=mwPt(e);
    const hb=hitBox(ww.x,ww.y);
    if(hb&&selBox&&hb.id===selBox.id){saveU();hb.rot=((hb.rot||0)+Math.PI/2)%(Math.PI*2);setDirty();render();renderRP();return;}
    const hs=hitSym(ww.x,ww.y);
    if(hs&&selSym&&hs.id===selSym.id){saveU();hs.rot=((hs.rot||0)+Math.PI/2)%(Math.PI*2);setDirty();render();return;}
  }
}

function onDown(e){
  const ww=mwPt(e);

  // PAN con rueda o herramienta pan
  if(e.button===1||(e.button===0&&tool==='pan')){
    panning=true;pSX=e.clientX;pSY=e.clientY;pPX=panX;pPY=panY;cv.style.cursor='grabbing';return;
  }
  if(e.button!==0)return;

  // ── PARED ──
  if(tool==='wall'){
    if(!wDraw.on){
      saveU();const g=sg(ww.x,ww.y),se=findSnapWE(g.x,g.y);
      wDraw.on=true;wDraw.start=se||g;
    }else{
      let ex=ww.x,ey=ww.y;
      if(!document.getElementById('freeA')?.checked){const c=constrA(ex,ey,wDraw.start.x,wDraw.start.y);ex=c.x;ey=c.y;}
      const g=sg(ex,ey),se=findSnapWE(g.x,g.y),end=se||g;
      if(D(end.x,end.y,wDraw.start.x,wDraw.start.y)<0.3){wDraw.on=false;wDraw.start=null;return;}
      walls.push({id:wId++,x1:wDraw.start.x,y1:wDraw.start.y,x2:end.x,y2:end.y,thick:getThickCm()});
      wDraw.start={...end};setDirty();render();
    }
    return;
  }

  // ── CAJAS ──
  if(['oct','rct','tab'].includes(tool)){
    const g=sg(ww.x,ww.y);saveU();
    boxes.push({id:bId++,type:tool,x:g.x,y:g.y,rot:0});
    setDirty();render();renderRP();return;
  }

  // ── CORRUGADO ──
  if(tool==='pipe'){
    const snapK=findSnapKO(ww.x,ww.y);
    if(!pipeDraw.on){
      if(!snapK){hint('El corrugado debe iniciar en un conector (punto naranja de una caja).');return;}
      saveU();
      const kpos=koConnPos(snapK.box,snapK.ko);
      pipeDraw.on=true;pipeDraw.fromBox=snapK.box;pipeDraw.fromKO=snapK.ko;
      pipeDraw.pts=[{x:kpos.x,y:kpos.y}];
      hint('Trazá el recorrido · Clic=punto · Clic en conector=terminar · Doble clic=terminar libre · Clic der=cancelar');
    }else{
      if(snapK&&snapK.box.id!==pipeDraw.fromBox?.id){
        const kpos=koConnPos(snapK.box,snapK.ko);
        finishPipe(snapK.box,snapK.ko,{x:kpos.x,y:kpos.y});
      }else{
        pipeDraw.pts.push({...sg(ww.x,ww.y)});render();
      }
    }
    return;
  }

  // ── COTA ──
  if(tool==='dim'){
    const g=sg(ww.x,ww.y);
    if(dimDraw.phase===0){
      dimDraw.phase=1;dimDraw.p1={...g};hint('Clic en el segundo punto de la cota');
    }else if(dimDraw.phase===1){
      if(D(g.x,g.y,dimDraw.p1.x,dimDraw.p1.y)<1){return;}
      dimDraw.phase=2;dimDraw.p2={...g};hint('Arrastrá para ajustar la distancia · Clic para confirmar');
    }else{
      saveU();dims.push({id:dId++,p1:{...dimDraw.p1},p2:{...dimDraw.p2},offset:calcOffset(dimDraw.p1,dimDraw.p2,ww)});
      dimDraw.phase=0;dimDraw.p1=null;dimDraw.p2=null;setDirty();render();hint('Clic en punto 1 · ESC=cancelar');
    }
    return;
  }

  // ── SELECCIÓN ──
  if(tool==='sel'){
    // Punto de control de corrugado seleccionado
    if(selPipe){
      const ptIdx=hitPipeCP(ww.x,ww.y,selPipe);
      if(ptIdx>=0){pipeEdit.seg=selPipe;pipeEdit.ptIdx=ptIdx;pipeEdit.dragging=true;cv.style.cursor='grabbing';return;}
      // Clic sobre trazo → insertar punto
      const onP=hitPipe(ww.x,ww.y);
      if(onP&&onP.id===selPipe.id){
        saveU();
        const allPts=pipeAllPts(selPipe);
        let bestSeg=1,bestD=Infinity;
        for(let i=1;i<allPts.length;i++){
          const a=allPts[i-1],b=allPts[i],dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
          if(!l2)continue;
          const t=Math.max(0,Math.min(1,((ww.x-a.x)*dx+(ww.y-a.y)*dy)/l2));
          const d2=(ww.x-a.x-t*dx)**2+(ww.y-a.y-t*dy)**2;
          if(d2<bestD){bestD=d2;bestSeg=i;}
        }
        const idx=Math.max(0,bestSeg-1);const g=sg(ww.x,ww.y);
        selPipe.ctrlPts.splice(idx,0,{x:g.x,y:g.y});
        pipeEdit.seg=selPipe;pipeEdit.ptIdx=idx;pipeEdit.dragging=true;
        cv.style.cursor='grabbing';setDirty();render();return;
      }
    }
    // Caja seleccionada → arrastrar
    if(selBox){
      const hb=hitBox(ww.x,ww.y);
      if(hb&&hb.id===selBox.id){
        boxDrag.on=true;boxDrag.box=hb;boxDrag.offX=ww.x-hb.x;boxDrag.offY=ww.y-hb.y;cv.style.cursor='grabbing';return;
      }
    }
    // Seleccionar
    const hb=hitBox(ww.x,ww.y),hp=hitPipe(ww.x,ww.y),hw=hitWall(ww.x,ww.y),hd=hitDim(ww.x,ww.y);
    const hs2=hitSym(ww.x,ww.y),hew=hitEWire(ww.x,ww.y);
    selBox=hb||null;selPipe=(!hb&&hp)||null;selWall=(!hb&&!hp&&hw)||null;selDim=(!hb&&!hp&&!hw&&hd)||null;
    selSym=(!hb&&!hp&&!hw&&!hd&&hs2)||null;selEWire=(!hb&&!hp&&!hw&&!hd&&!hs2&&hew)||null;
    pipeEdit.seg=null;pipeEdit.ptIdx=-1;pipeEdit.dragging=false;
    wireEdit.seg=null;wireEdit.ptIdx=-1;wireEdit.dragging=false;
    if(hb){boxDrag.on=true;boxDrag.box=hb;boxDrag.offX=ww.x-hb.x;boxDrag.offY=ww.y-hb.y;cv.style.cursor='grabbing';}
    if(hs2&&!hb){boxDrag.on=true;boxDrag.box=hs2;boxDrag.offX=ww.x-hs2.x;boxDrag.offY=ww.y-hs2.y;cv.style.cursor='grabbing';}
    renderRP();render();return;
  }

  // ── SÍMBOLOS AEA ──
  const aeaSymTools=['luz','luz-p','toma-s','toma-d','tecla-s','tecla-d','tecla-t','tecla-de','tablero','fan-e'];
  if(aeaSymTools.includes(tool)){
    const g=sg(ww.x,ww.y);saveU();
    elecSyms.push({id:esId++,type:tool,x:g.x,y:g.y,rot:0,circuitId:activeCircuitId,label:''});
    setDirty();render();renderRP();return;
  }

  // ── CONDUCTORES AEA ──
  if(tool==='wire-s'||tool==='wire-r'){
    const wtype=tool==='wire-r'?'dashed':'solid';
    // Prioridad de snap: 1) anclaje de símbolo, 2) grilla
    const sa=findSnapAnchor(ww.x,ww.y);
    const pt=sa?{x:sa.wx,y:sa.wy}:sg(ww.x,ww.y);
    if(!wireDraw.on){
      saveU();
      wireDraw.on=true;
      wireDraw.pts=[{...pt}];
      wireDraw.type=wtype;
      wireDraw.fromSymId=sa?sa.sym.id:null;
      hint('Trazá el recorrido · Clic=punto · Clic en anclaje=terminar · Doble clic=terminar libre · Clic der=cancelar');
    }else{
      // Si el punto es un anclaje de símbolo → terminar y anclar
      if(sa&&sa.sym.id!==wireDraw.fromSymId){
        wireDraw.pts.push({x:sa.wx,y:sa.wy});
        saveU();
        elecWires.push({
          id:ewId++,
          pts:[...wireDraw.pts],
          type:wireDraw.type,
          circuitId:activeCircuitId,
          fromSymId:wireDraw.fromSymId||null,
          toSymId:sa.sym.id
        });
        wireDraw.on=false;wireDraw.pts=[];wireDraw.fromSymId=null;
        setDirty();render();renderRP();
        hint('S=sel · F1=conductor · F2=retorno · ESC=cancelar');
      }else{
        // Punto intermedio
        wireDraw.pts.push({...pt});render();
      }
    }
    return;
  }
  if(tool==='era'){
    const hb=hitBox(ww.x,ww.y);if(hb){saveU();boxes=boxes.filter(b=>b.id!==hb.id);pipes=pipes.filter(p=>p.fromBoxId!==hb.id&&p.toBoxId!==hb.id);if(selBox?.id===hb.id)selBox=null;setDirty();render();renderRP();return;}
    const hp=hitPipe(ww.x,ww.y);if(hp){saveU();pipes=pipes.filter(p=>p.id!==hp.id);if(selPipe?.id===hp.id)selPipe=null;setDirty();render();renderRP();return;}
    const hw=hitWall(ww.x,ww.y);if(hw){saveU();walls=walls.filter(w=>w.id!==hw.id);if(selWall?.id===hw.id)selWall=null;setDirty();render();renderRP();return;}
    const hd=hitDim(ww.x,ww.y);if(hd){saveU();dims=dims.filter(d=>d.id!==hd.id);setDirty();render();return;}
    const hs=hitSym(ww.x,ww.y);if(hs){saveU();elecSyms=elecSyms.filter(s=>s.id!==hs.id);if(selSym?.id===hs.id)selSym=null;setDirty();render();renderRP();return;}
    const hew=hitEWire(ww.x,ww.y);if(hew){saveU();elecWires=elecWires.filter(w=>w.id!==hew.id);if(selEWire?.id===hew.id)selEWire=null;setDirty();render();return;}
  }
}

function finishPipe(toBox,toKO,toPos){
  if(pipeDraw.pts.length<2){cancelPipeDraw();return;}
  const ctrlPts=pipeDraw.pts.slice(1);
  pipes.push({id:pId++,fromPos:{...pipeDraw.pts[0]},fromBoxId:pipeDraw.fromBox?.id||null,toPos:toPos?{...toPos}:null,toBoxId:toBox?.id||null,ctrlPts:[...ctrlPts]});
  cancelPipeDraw();setDirty();render();renderRP();
  hint('S=sel · W=pared · O/R/T=cajas · C=corrugado · D=cota · 1-9=símbolos AEA · H=pan');
}
function cancelPipeDraw(){pipeDraw.on=false;pipeDraw.fromBox=null;pipeDraw.fromKO=null;pipeDraw.pts=[];render();}

function onMove(e){
  const ww=mwPt(e);mouseW={...ww};
  if(panning){panX=pPX+(e.clientX-pSX);panY=pPY+(e.clientY-pSY);render();return;}

  // Arrastrar caja o símbolo AEA
  if(boxDrag.on&&boxDrag.box){
    const g=sg(ww.x-boxDrag.offX,ww.y-boxDrag.offY);
    const dx=g.x-boxDrag.box.x,dy=g.y-boxDrag.box.y;
    boxDrag.box.x=g.x;boxDrag.box.y=g.y;
    // Si es caja, mover extremos de corrugados anclados
    if(boxDrag.box.type&&['oct','rct','tab'].includes(boxDrag.box.type)){
      for(const pipe of pipes){
        if(pipe.fromBoxId===boxDrag.box.id&&pipe.fromPos){pipe.fromPos.x+=dx;pipe.fromPos.y+=dy;}
        if(pipe.toBoxId===boxDrag.box.id&&pipe.toPos){pipe.toPos.x+=dx;pipe.toPos.y+=dy;}
      }
    }
    setDirty();render();return;
  }

  // Arrastrar punto control corrugado
  if(pipeEdit.dragging&&pipeEdit.seg&&pipeEdit.ptIdx>=0){
    const g=sg(ww.x,ww.y);pipeEdit.seg.ctrlPts[pipeEdit.ptIdx]={x:g.x,y:g.y};setDirty();render();return;
  }

  // Arrastrar punto control conductor AEA
  if(wireEdit.dragging&&wireEdit.seg&&wireEdit.ptIdx>=0){
    const g=sg(ww.x,ww.y);wireEdit.seg.pts[wireEdit.ptIdx]={x:g.x,y:g.y};setDirty();render();return;
  }

  document.getElementById('sb-cur').textContent=`${(ww.x/100).toFixed(2)}m, ${(ww.y/100).toFixed(2)}m`;
  snapKO=findSnapKO(ww.x,ww.y);
  // Snap a anclaje de símbolo AEA (solo cuando se dibuja conductor)
  if(tool==='wire-s'||tool==='wire-r'){
    snapAnchor=findSnapAnchor(ww.x,ww.y);
  }else{
    snapAnchor=null;
  }

  const now=Date.now();
  if(now-lastHoverT>80){
    lastHoverT=now;
    const tip=document.getElementById('ftip');
    const hp=!pipeDraw.on&&hitPipe(ww.x,ww.y);
    const hb=!pipeDraw.on&&hitBox(ww.x,ww.y);
    const hs=hitSym(ww.x,ww.y);
    if(hp&&hp!==selPipe){
      const fn=boxes.find(b=>b.id===hp.fromBoxId),tn=boxes.find(b=>b.id===hp.toBoxId);
      tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';
      tip.textContent=`${fn?nLabel(fn.type):'libre'} → ${tn?nLabel(tn.type):'libre'}  ·  ${pipeLen(hp)} m`;
    }else if(hb&&hb!==selBox){
      tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';
      const usedKO=pipes.filter(p=>p.fromBoxId===hb.id||p.toBoxId===hb.id).length;
      tip.textContent=`${nLabel(hb.type)}  ·  ${usedKO}/${getKOs(hb.type).length} KO usados`;
    }else if(hs&&hs!==selSym){
      const circ=getCircuit(hs.circuitId);
      tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';
      tip.textContent=`${symLabel(hs.type)}${hs.label?' · '+hs.label:''}  ·  ${circ.name}`;
    }else{tip.style.display='none';}
    if(tool==='sel'){
      if(selPipe){const ptIdx=hitPipeCP(ww.x,ww.y,selPipe);const onP=hitPipe(ww.x,ww.y);cv.style.cursor=ptIdx>=0?'grab':onP?.id===selPipe.id?'copy':'default';}
      else if(selEWire){const ci=hitEWireCP(ww.x,ww.y,selEWire);const onEW=hitEWire(ww.x,ww.y);cv.style.cursor=ci>=0?'grab':onEW?.id===selEWire.id?'copy':'default';}
      else if(selBox||selSym){cv.style.cursor=(hitBox(ww.x,ww.y)||hitSym(ww.x,ww.y))?'grab':'default';}
      else cv.style.cursor='default';
    }
  }
  render();
}

function onUp(){
  if(panning){panning=false;cv.style.cursor=tool==='pan'?'grab':'crosshair';}
  if(pipeEdit.dragging){pipeEdit.dragging=false;cv.style.cursor='default';}
  if(wireEdit.dragging){wireEdit.dragging=false;cv.style.cursor='default';}
  if(boxDrag.on){boxDrag.on=false;boxDrag.box=null;cv.style.cursor='default';}
}

function symLabel(t){return{luz:'Luz techo','luz-p':'Luz pared','toma-s':'Toma simple','toma-d':'Toma doble','tecla-s':'Tecla simple','tecla-d':'Tecla doble','tecla-t':'Tecla triple','tecla-de':'Tecla doble efecto',tablero:'Tablero AEA','fan-e':'Ventilador'}[t]||t;}

function onDbl(e){
  const ww=mwPt(e);
  if(tool==='pipe'&&pipeDraw.on){pipeDraw.pts.push({...sg(ww.x,ww.y)});finishPipe(null,null,null);return;}
  if((tool==='wire-s'||tool==='wire-r')&&wireDraw.on){
    const sa=findSnapAnchor(ww.x,ww.y);
    const pt=sa?{x:sa.wx,y:sa.wy}:sg(ww.x,ww.y);
    wireDraw.pts.push({...pt});
    if(wireDraw.pts.length>=2){
      saveU();
      elecWires.push({
        id:ewId++,pts:[...wireDraw.pts],type:wireDraw.type,
        circuitId:activeCircuitId,
        fromSymId:wireDraw.fromSymId||null,
        toSymId:sa?sa.sym.id:null
      });
      wireDraw.on=false;wireDraw.pts=[];wireDraw.fromSymId=null;
      setDirty();render();renderRP();
    }
    return;
  }
  // Doble clic sobre punto de control del corrugado → eliminar
  if(tool==='sel'&&selPipe){
    const ptIdx=hitPipeCP(ww.x,ww.y,selPipe);
    if(ptIdx>=0&&selPipe.ctrlPts.length>0){saveU();selPipe.ctrlPts.splice(ptIdx,1);setDirty();render();return;}
  }
  // Doble clic sobre punto de control del conductor → eliminar
  if(tool==='sel'&&selEWire){
    const ci=hitEWireCP(ww.x,ww.y,selEWire);
    if(ci>=0){saveU();selEWire.pts.splice(ci,1);setDirty();render();return;}
  }
  // Doble clic sobre símbolo → editar etiqueta
  if(tool==='sel'){
    const hs=hitSym(ww.x,ww.y);
    if(hs){
      const label=prompt(`Etiqueta para ${symLabel(hs.type)} (opcional, Enter para borrar):`,hs.label||'');
      if(label!==null){saveU();hs.label=label.trim();setDirty();render();}
      return;
    }
  }
}

function onWheel(e){
  e.preventDefault();const f=e.deltaY<0?1.12:.89;
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  panX=mx+(panX-mx)*f;panY=my+(panY-my)*f;
  zoom=Math.max(.08,Math.min(16,zoom*f));
  document.getElementById('sb-zm').textContent=`${Math.round(zoom*100)}%`;render();
}

// HELPERS
// ═══════════════════════════════════════════════════════════════════════
function constrA(wx,wy,fx,fy){
  const dx=wx-fx,dy=wy-fy,a=Math.atan2(dy,dx),s=Math.PI/12,sa=Math.round(a/s)*s,l=Math.sqrt(dx*dx+dy*dy);
  return{x:fx+Math.cos(sa)*l,y:fy+Math.sin(sa)*l};
}
function getThickCm(){return parseInt(document.getElementById('wThick')?.value||8);}
function hint(text){document.getElementById('sb-hint').textContent=text;}
function toggleLayer(n){
  // Ciclo: 2 (visible) → 1 (atenuado) → 0 (oculto) → 2 (visible)
  // Usar nullish coalescing para no confundir 0 con falsy
  const cur=layers[n]??2;
  layers[n]=cur===2?1:cur===1?0:2;
  const btn=document.getElementById(`lb-${n}`);
  const state=layers[n];
  btn.className='lbtn'+(state===0?' hid':state===1?' dim':'');
  const labels={2:'',1:' (atenuado)',0:' (oculto)'};
  btn.title=`${n}${labels[state]}`;
  render();
}

// Helper: opacidad según estado de capa
function layerAlpha(n){
  const s=layers[n]??2;
  if(s===0)return 0;
  if(s===1)return 0.18;
  return 1;
}

  cv.style.cursor=t==='pan'?'grab':'crosshair';

    pipe:'Clic en conector naranja para iniciar · Clic=punto · Clic en conector=terminar · Doble clic=terminar libre',
    dim:'Clic=punto 1 · Clic=punto 2 · Arrastrá=offset · Clic=confirmar',
    luz:'Clic para colocar Luz techo','luz-p':'Clic para colocar Luz pared',
    'toma-s':'Clic para colocar Toma simple','toma-d':'Clic para colocar Toma doble',
    'tecla-s':'Clic para colocar Tecla simple','tecla-d':'Clic para colocar Tecla doble',
    'tecla-t':'Clic para colocar Tecla triple','tecla-de':'Clic para colocar Tecla doble efecto',
    tablero:'Clic para colocar Tablero AEA','fan-e':'Clic para colocar Ventilador',
    'wire-s':'Clic=punto · Doble clic=terminar · Clic der=cancelar',
    'wire-r':'Retorno de luz · Clic=punto · Doble clic=terminar · Clic der=cancelar',
    pan:'Arrastrá para mover la vista',

  hint(hints[t]||'');render();

function lstHTML(){
  const bList=boxes.map((b,i)=>{
    const used=pipes.filter(p=>p.fromBoxId===b.id||p.toBoxId===b.id).length;
    return`<div class="ic ${selBox?.id===b.id?'sel':''}" onclick="selBox=boxes[${i}];selPipe=null;selWall=null;selDim=null;render();renderRP()">
      <button class="icdel" onclick="event.stopPropagation();delBox(${b.id})">✕</button>
      <div class="icn">${nLabel(b.type)} ${i+1}${b.rot?` (${Math.round((b.rot||0)*180/Math.PI)}°)`:''}
      </div><div class="icm">${(b.x/100).toFixed(2)}m, ${(b.y/100).toFixed(2)}m · ${used}/${getKOs(b.type).length} KO</div>
    </div>`;}).join('');
  const pList=pipes.map((p,i)=>{
    const fn=boxes.find(b=>b.id===p.fromBoxId),tn=boxes.find(b=>b.id===p.toBoxId);
    return`<div class="ic ${selPipe?.id===p.id?'sel':''}" onclick="selPipe=pipes[${i}];selBox=null;selWall=null;selDim=null;render();renderRP()">
      <button class="icdel" onclick="event.stopPropagation();delPipe(${p.id})">✕</button>
      <div class="icn">Corrugado ${i+1}</div>
      <div class="icm">${fn?nLabel(fn.type):'libre'} → ${tn?nLabel(tn.type):'libre'}  ·  ${pipeLen(p)} m</div>
    </div>`;}).join('');
  return`<div style="padding:5px">
    <div class="rpt" style="padding:5px 4px 3px">Cajas (${boxes.length})</div>${bList||'<div class="noitem">Sin cajas</div>'}

}

function delBox(id){saveU();boxes=boxes.filter(b=>b.id!==id);pipes=pipes.filter(p=>p.fromBoxId!==id&&p.toBoxId!==id);if(selBox?.id===id)selBox=null;setDirty();render();renderRP();}
function delPipe(id){saveU();pipes=pipes.filter(p=>p.id!==id);if(selPipe?.id===id)selPipe=null;setDirty();render();renderRP();}
function delWall(id){saveU();walls=walls.filter(w=>w.id!==id);if(selWall?.id===id)selWall=null;setDirty();render();renderRP();}

function saveU(){
  undoStack.push(JSON.parse(JSON.stringify({walls,boxes,pipes,dims,elecSyms,elecWires,circuits,wId,bId,pId,dId,esId,ewId,circuitIdCtr,activeCircuitId})));
  if(undoStack.length>40)undoStack.shift();
  setDirty();
}
function undo(){
  if(!undoStack.length)return;
  const s=undoStack.pop();
  walls=s.walls;boxes=s.boxes;pipes=s.pipes;dims=s.dims||[];
  elecSyms=s.elecSyms||[];elecWires=s.elecWires||[];circuits=s.circuits||circuits;
  wId=s.wId;bId=s.bId;pId=s.pId;dId=s.dId||1;
  esId=s.esId||1;ewId=s.ewId||1;circuitIdCtr=s.circuitIdCtr||4;activeCircuitId=s.activeCircuitId||1;
  selBox=null;selPipe=null;selWall=null;selDim=null;selSym=null;selEWire=null;
  cancelPipeDraw();wDraw.on=false;wDraw.start=null;dimDraw.phase=0;wireDraw.on=false;wireDraw.pts=[];
  render();renderRP();
}
function setDirty(){dirty=true;const el=document.getElementById('sInd');el.textContent='Sin guardar •';el.className='sind dirty';}
function setSaved(){dirty=false;const el=document.getElementById('sInd');el.textContent='Guardado ✓';el.className='sind saved';}

function saveProject(){
  const name=document.getElementById('projName').value.trim()||'Plano';
  const all=JSON.parse(localStorage.getItem('ec2_p')||'{}');
  const id=Object.keys(all).find(k=>all[k].name===name)||('p'+Date.now());
  all[id]={id,name,savedAt:new Date().toISOString(),walls,boxes,pipes,dims,elecSyms,elecWires,circuits,wId,bId,pId,dId,esId,ewId,circuitIdCtr,activeCircuitId,scale,gridCm};
  localStorage.setItem('ec2_p',JSON.stringify(all));localStorage.setItem('ec2_last',id);setSaved();
}
function openLoad(){
  const all=JSON.parse(localStorage.getItem('ec2_p')||'{}');
  const ps=Object.values(all).sort((a,b)=>new Date(b.savedAt)-new Date(a.savedAt));
  if(!ps.length){alert('No hay proyectos guardados.');return;}
  const ch=prompt(ps.map((p,i)=>`${i+1}. ${p.name} (${new Date(p.savedAt).toLocaleDateString('es-AR')})`).join('\n')+'\n\nNúmero:');
  if(!ch)return;const idx=parseInt(ch)-1;
  if(idx>=0&&idx<ps.length){
    const p=ps[idx];
    walls=p.walls||[];boxes=p.boxes||[];pipes=p.pipes||[];dims=p.dims||[];
    elecSyms=p.elecSyms||[];elecWires=p.elecWires||[];
    circuits=p.circuits||circuits;
    wId=p.wId||walls.length+1;bId=p.bId||boxes.length+1;pId=p.pId||pipes.length+1;dId=p.dId||dims.length+1;
    esId=p.esId||elecSyms.length+1;ewId=p.ewId||elecWires.length+1;
    circuitIdCtr=p.circuitIdCtr||4;activeCircuitId=p.activeCircuitId||1;
    scale=p.scale||50;gridCm=p.gridCm||25;
    document.getElementById('projName').value=p.name;
    render();renderRP();setSaved();
  }
}
function exportFile(){
  saveProject();
  const blob=new Blob([document.documentElement.outerHTML],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`electrocad-${(document.getElementById('projName').value||'plano').replace(/\s+/g,'-')}.html`;a.click();
}

function exportPDF(){
  // Pre-cargar datos del proyecto en el modal
  document.getElementById('pdf-proj').value=document.getElementById('projName').value||'';
  document.getElementById('pdf-date').value=new Date().toLocaleDateString('es-AR');
  document.getElementById('pdfOverlay').classList.remove('hidden');
