function closePdfModal(){document.getElementById('pdfOverlay').classList.add('hidden');}

async function generatePDF(){
  const progBar=document.getElementById('pdfProgress');
  const progFill=document.getElementById('pdfProgressFill');
  progBar.style.display='block';progFill.style.width='10%';

  const projName=document.getElementById('pdf-proj').value||document.getElementById('projName').value||'Plano';
  const addr=document.getElementById('pdf-addr').value||'';
  const date=document.getElementById('pdf-date').value||new Date().toLocaleDateString('es-AR');
  const profName=document.getElementById('pdf-name').value||'';
  const mat=document.getElementById('pdf-mat').value||'';
  const tel=document.getElementById('pdf-tel').value||'';
  const inclPlan=document.getElementById('pdf-opt-plan').checked;
  const inclMat=document.getElementById('pdf-opt-mat').checked;
  const inclBorder=document.getElementById('pdf-opt-border').checked;
  const inclLegend=document.getElementById('pdf-opt-legend').checked;

  try{
    // Cargar jsPDF dinámicamente
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
    progFill.style.width='25%';

    const {jsPDF}=window.jspdf;
    // A4 horizontal para el plano, vertical para materiales
    const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    const PW=297,PH=210; // A4 landscape mm

    // ── HOJA 1: PLANO ──────────────────────────────────────────────
    if(inclPlan){
      progFill.style.width='35%';
      drawPlanPage(pdf,PW,PH,projName,addr,date,profName,mat,tel,inclBorder,inclLegend);
      progFill.style.width='65%';
    }

    // ── HOJA 2: MATERIALES ─────────────────────────────────────────
    if(inclMat){
      if(inclPlan)pdf.addPage('a4','portrait');
      else pdf.setPage(1);
      progFill.style.width='80%';
      drawMatPage(pdf,inclPlan?210:297,inclPlan?297:210,projName,addr,date,profName,mat,tel,inclBorder);
      progFill.style.width='95%';
    }

    // Guardar
    const fname=`electrocad-${projName.replace(/\s+/g,'-').toLowerCase()}-${date.replace(/\//g,'-')}.pdf`;
    pdf.save(fname);
    progFill.style.width='100%';
    setTimeout(()=>{progBar.style.display='none';progFill.style.width='0%';closePdfModal();},600);

  }catch(err){
    console.error('PDF error:',err);
    alert('Error al generar el PDF: '+err.message);
    progBar.style.display='none';
  }
}

function loadScript(url){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${url}"]`)){res();return;}
    const s=document.createElement('script');s.src=url;s.onload=res;s.onerror=rej;document.head.appendChild(s);
  });
}

// Dibuja la hoja del plano en el PDF
function drawPlanPage(pdf,PW,PH,projName,addr,date,profName,mat,tel,inclBorder,inclLegend){
  const MARGIN=inclBorder?15:8;
  const CARTELA_H=inclBorder?22:0;
  const plotW=PW-MARGIN*2;
  const plotH=PH-MARGIN*2-CARTELA_H;

  // Marco exterior
  if(inclBorder){
    pdf.setDrawColor(50,60,80);pdf.setLineWidth(.5);
    pdf.rect(MARGIN-2,MARGIN-2,PW-MARGIN*2+4,PH-MARGIN*2+4);
    pdf.setLineWidth(.2);
    pdf.rect(MARGIN,MARGIN,plotW,plotH+CARTELA_H);
    // Línea de cartela
    pdf.line(MARGIN,PH-MARGIN-CARTELA_H,PW-MARGIN,PH-MARGIN-CARTELA_H);
    // Divisiones de cartela
    pdf.line(MARGIN+plotW*.55,PH-MARGIN-CARTELA_H,MARGIN+plotW*.55,PH-MARGIN);
    pdf.line(MARGIN+plotW*.75,PH-MARGIN-CARTELA_H,MARGIN+plotW*.75,PH-MARGIN);
  }

  // Calcular bounding box del plano en world coords
  const bbox=getWorldBBox();
  if(!bbox){
    // Sin elementos: mostrar grilla vacía
    pdf.setFontSize(10);pdf.setTextColor(150,150,150);
    pdf.text('(plano vacío)',PW/2,PH/2,{align:'center'});
  }else{
    // Escalar el plano para que entre en el área disponible con margen
    const PAD=10; // padding interno en mm
    const availW=plotW-PAD*2;const availH=plotH-PAD*2;
    const scaleX=availW/(bbox.w);const scaleY=availH/(bbox.h);
    const drawScale=Math.min(scaleX,scaleY);
    // Centrar
    const offX=MARGIN+PAD+(availW-bbox.w*drawScale)/2;
    const offY=MARGIN+PAD+(availH-bbox.h*drawScale)/2;

    // Función de conversión world → PDF mm
    const wx2pdf=(wx)=>offX+(wx-bbox.minX)*drawScale;
    const wy2pdf=(wy)=>offY+(wy-bbox.minY)*drawScale;

    // ── Dibujar grilla de referencia (suave) ──
    pdf.setDrawColor(220,225,235);pdf.setLineWidth(.1);
    const gridStep=100; // 1m en world coords (1m=100cm)
    const gx0=Math.ceil(bbox.minX/gridStep)*gridStep;
    const gy0=Math.ceil(bbox.minY/gridStep)*gridStep;
    for(let gx=gx0;gx<=bbox.maxX;gx+=gridStep){
      const px=wx2pdf(gx);if(px<MARGIN||px>PW-MARGIN)continue;
      pdf.line(px,offY,px,offY+bbox.h*drawScale);
    }
    for(let gy=gy0;gy<=bbox.maxY;gy+=gridStep){
      const py=wy2pdf(gy);if(py<MARGIN||py>PH-MARGIN)continue;
      pdf.line(offX,py,offX+bbox.w*drawScale,py);
    }

    // ── Dibujar paredes ──
    if(layers.walls){
      for(const w of walls){
        const dx=w.x2-w.x1,dy=w.y2-w.y1,len=Math.sqrt(dx*dx+dy*dy);
        if(len<.5)continue;
        const nx=-dy/len*(w.thick/2)*drawScale;
        const ny=dx/len*(w.thick/2)*drawScale;
        const pts=[
          [wx2pdf(w.x1)+nx,wy2pdf(w.y1)+ny],
          [wx2pdf(w.x2)+nx,wy2pdf(w.y2)+ny],
          [wx2pdf(w.x2)-nx,wy2pdf(w.y2)-ny],
          [wx2pdf(w.x1)-nx,wy2pdf(w.y1)-ny],
        ];
        pdf.setFillColor(60,70,90);pdf.setDrawColor(50,60,80);pdf.setLineWidth(.15);
        pdf.polygon(pts.map(p=>({x:p[0],y:p[1]})),'FD');
        // Cota de longitud
        const lm=wallLenM(w);
        if(len*drawScale>12){
          const mx=(wx2pdf(w.x1)+wx2pdf(w.x2))/2;
          const my=(wy2pdf(w.y1)+wy2pdf(w.y2))/2;
          pdf.setFontSize(5);pdf.setTextColor(100,110,130);
          pdf.text(`${lm}m`,mx,my-w.thick/2*drawScale-1,{align:'center'});
        }
      }
    }

    // ── Dibujar corrugados ──
    if(layers.pipes){
      for(const seg of pipes){
        const pts=pipeAllPts(seg);if(pts.length<2)continue;
        pdf.setDrawColor(200,130,40);pdf.setLineWidth(.6);pdf.setLineDashPattern([1.5,1.5],.5);
        pdf.lines(
          pts.slice(1).map((p,i)=>[wx2pdf(p.x)-wx2pdf(pts[i].x),wy2pdf(p.y)-wy2pdf(pts[i].y)]),
          wx2pdf(pts[0].x),wy2pdf(pts[0].y)
        );
        pdf.setLineDashPattern([],0);
      }
      // Cajas
      for(const box of boxes){
        const bx=wx2pdf(box.x),by=wy2pdf(box.y);
        const s=BOX_SIZES[box.type];
        const hw=s.w*drawScale/2,hh=s.h*drawScale/2;
        pdf.setDrawColor(200,130,40);pdf.setLineWidth(.4);pdf.setFillColor(255,245,230);
        if(box.type==='oct'){
          const pts2=[];
          for(let i=0;i<8;i++){const a=i*Math.PI/4-Math.PI/8;pts2.push({x:bx+hw*Math.cos(a),y:by+hh*Math.sin(a)});}
          pdf.polygon(pts2,'FD');
        }else{
          pdf.rect(bx-hw,by-hh,hw*2,hh*2,'FD');
        }
      }
    }

    // ── Dibujar conductores AEA ──
    if(layers.wires){
      for(const ew of elecWires){
        if(ew.pts.length<2)continue;
        const circ=getCircuit(ew.circuitId);
        const rgb=hexToRgb(circ.color);
        pdf.setDrawColor(rgb.r,rgb.g,rgb.b);pdf.setLineWidth(.5);
        if(ew.type==='dashed')pdf.setLineDashPattern([2,1.5],.5);
        else pdf.setLineDashPattern([],0);
        // Trazar spline como líneas rectas entre puntos (buena aproximación)
        const pts=ew.pts;
        pdf.lines(
          pts.slice(1).map((p,i)=>[wx2pdf(p.x)-wx2pdf(pts[i].x),wy2pdf(p.y)-wy2pdf(pts[i].y)]),
          wx2pdf(pts[0].x),wy2pdf(pts[0].y)
        );
        pdf.setLineDashPattern([],0);
      }
    }

    // ── Dibujar símbolos AEA ──
    if(layers.elec){
      for(const sym of elecSyms){
        const circ=getCircuit(sym.circuitId);
        const rgb=hexToRgb(circ.color);
        const sx=wx2pdf(sym.x),sy=wy2pdf(sym.y);
        const r=SYM_R*drawScale;
        drawSymbolPDF(pdf,sym.type,sx,sy,r,rgb,sym.rot||0);
        // Etiqueta
        if(sym.label){
          pdf.setFontSize(5);pdf.setTextColor(rgb.r,rgb.g,rgb.b);
          pdf.text(sym.label,sx,sy+r+2.5,{align:'center'});
        }
      }
    }

    // ── Dibujar cotas ──
    if(layers.dims){
      for(const d of dims){
        const p1x=wx2pdf(d.p1.x),p1y=wy2pdf(d.p1.y);
        const p2x=wx2pdf(d.p2.x),p2y=wy2pdf(d.p2.y);
        const dx=p2x-p1x,dy=p2y-p1y,len=Math.sqrt(dx*dx+dy*dy)||1;
        const nx=-dy/len,ny=dx/len;
        const off=d.offset*drawScale;
        const c1x=p1x+nx*off,c1y=p1y+ny*off;
        const c2x=p2x+nx*off,c2y=p2y+ny*off;
        pdf.setDrawColor(60,140,200);pdf.setLineWidth(.3);
        pdf.line(p1x,p1y,c1x,c1y);pdf.line(p2x,p2y,c2x,c2y);
        pdf.line(c1x,c1y,c2x,c2y);
        const lm=(D(d.p1.x,d.p1.y,d.p2.x,d.p2.y)/100).toFixed(2);
        const mx=(c1x+c2x)/2,my=(c1y+c2y)/2;
        pdf.setFontSize(5.5);pdf.setTextColor(60,140,200);
        pdf.text(`${lm} m`,mx,my-1,{align:'center'});
      }
    }

    // ── Escala gráfica ──
    const scaleBarW=10*drawScale; // 1m en el PDF
    const sbX=MARGIN+PAD,sbY=offY+bbox.h*drawScale+3;
    if(sbY<PH-MARGIN-CARTELA_H-5){
      pdf.setDrawColor(60,70,90);pdf.setLineWidth(.3);
      pdf.line(sbX,sbY,sbX+scaleBarW,sbY);
      pdf.line(sbX,sbY-1,sbX,sbY+1);pdf.line(sbX+scaleBarW,sbY-1,sbX+scaleBarW,sbY+1);
      pdf.setFontSize(5);pdf.setTextColor(60,70,90);
      pdf.text('0',sbX,sbY+2.5,{align:'center'});
      pdf.text('1 m',sbX+scaleBarW,sbY+2.5,{align:'center'});
      pdf.text(`Escala 1:${scale}`,sbX+scaleBarW/2,sbY-1.5,{align:'center'});
    }
  }

  // ── Leyenda de circuitos ──
  if(inclLegend&&circuits.length){
    const legX=inclBorder?MARGIN+plotW*.56:PW-MARGIN-45;
    const legY=inclBorder?PH-MARGIN-CARTELA_H+3:PH-MARGIN-10;
    pdf.setFontSize(6);pdf.setTextColor(60,70,90);
    pdf.text('REFERENCIAS',legX,legY+2);
    circuits.forEach((c,i)=>{
      const rgb=hexToRgb(c.color);
      const ly=legY+5+i*4.5;
      pdf.setFillColor(rgb.r,rgb.g,rgb.b);pdf.circle(legX+1.5,ly-.8,1.2,'F');
      pdf.setTextColor(50,60,80);pdf.setFontSize(5.5);
      pdf.text(`${c.name} (${c.amp}A)`,legX+4,ly);
    });
  }

  // ── Cartela ──
  if(inclBorder){
    const cy=PH-MARGIN-CARTELA_H+3;
    const cx=MARGIN+3;
    pdf.setFontSize(11);pdf.setTextColor(20,30,50);
    pdf.setFont(undefined,'bold');pdf.text(projName,cx,cy+5);
    pdf.setFont(undefined,'normal');pdf.setFontSize(7);pdf.setTextColor(80,90,110);
    if(addr)pdf.text(addr,cx,cy+10);
    pdf.setFontSize(8);pdf.setTextColor(20,30,50);
    if(profName){pdf.setFont(undefined,'bold');pdf.text(profName,MARGIN+plotW*.56+2,cy+5);pdf.setFont(undefined,'normal');}
    if(mat){pdf.setFontSize(6.5);pdf.setTextColor(80,90,110);pdf.text(mat,MARGIN+plotW*.56+2,cy+9.5);}
    if(tel)pdf.text(tel,MARGIN+plotW*.56+2,cy+13.5);
    pdf.setFontSize(7);pdf.setTextColor(80,90,110);
    pdf.text(`Fecha: ${date}`,MARGIN+plotW*.76+2,cy+5);
    pdf.text(`Escala: 1:${scale}`,MARGIN+plotW*.76+2,cy+10);
    pdf.text('ElectroCad 2.0',MARGIN+plotW*.76+2,cy+15);
  }
}

// Dibuja un símbolo AEA en el PDF (vectorial)
function drawSymbolPDF(pdf,type,cx,cy,r,rgb,rot){
  pdf.setDrawColor(rgb.r,rgb.g,rgb.b);
  pdf.setFillColor(rgb.r,rgb.g,rgb.b);
  pdf.setLineWidth(.4);
  // Función auxiliar para rotar un punto
  const rp=(lx,ly)=>{
    const c=Math.cos(rot),s=Math.sin(rot);
    return[cx+lx*c-ly*s,cy+lx*s+ly*c];
  };
  if(type==='luz'){
    pdf.circle(cx,cy,r,'S');
    const [x1,y1]=rp(-r*.7,-r*.7);const [x2,y2]=rp(r*.7,r*.7);pdf.line(x1,y1,x2,y2);
    const [x3,y3]=rp(r*.7,-r*.7);const [x4,y4]=rp(-r*.7,r*.7);pdf.line(x3,y3,x4,y4);
    const[ax,ay]=rp(0,r);pdf.circle(ax,ay,.8,'F');
  }
  else if(type==='luz-p'){
    const[ocx,ocy]=rp(0,-r*.9);pdf.circle(ocx,ocy,r,'S');
    const[a1,b1]=rp(-r*.65,-r*.9-r*.65);const[a2,b2]=rp(r*.65,-r*.9+r*.65);pdf.line(a1,b1,a2,b2);
    const[a3,b3]=rp(r*.65,-r*.9-r*.65);const[a4,b4]=rp(-r*.65,-r*.9+r*.65);pdf.line(a3,b3,a4,b4);
    const[lx1,ly1]=rp(0,-r*.9+r);const[lx2,ly2]=rp(0,r*.7);pdf.line(lx1,ly1,lx2,ly2);
    const[wx1,wy1]=rp(-r*1.5,r*.7);const[wx2,wy2]=rp(r*1.5,r*.7);pdf.line(wx1,wy1,wx2,wy2);
    const[ax,ay]=rp(0,r*.7);pdf.circle(ax,ay,.8,'F');
  }
  else if(type==='toma-s'||type==='toma-d'){
    // Semicírculo
    const steps=12;const pts2=[];
    for(let i=0;i<=steps;i++){const a=Math.PI-i*Math.PI/steps;const[px,py]=rp(r*Math.cos(a),(r*Math.sin(a))-r*.3);pts2.push({x:px,y:py});}
    if(pts2.length>1){pdf.setLineWidth(.4);for(let i=1;i<pts2.length;i++)pdf.line(pts2[i-1].x,pts2[i-1].y,pts2[i].x,pts2[i].y);}
    const[wx1,wy1]=rp(-r*1.4,0);const[wx2,wy2]=rp(r*1.4,0);pdf.line(wx1,wy1,wx2,wy2);
    const sq=r*.22;
    const[lx,ly]=rp(-r,0);pdf.rect(lx-sq/2,ly-sq/2,sq,sq,'F');
    const[rx,ry]=rp(r,0);pdf.rect(rx-sq/2,ry-sq/2,sq,sq,'F');
    const[tx,ty]=rp(0,-r*.3-r);pdf.rect(tx-sq/2,ty-sq/2,sq,sq,'F');
    if(type==='toma-d'){const[tx2,ty2]=rp(0,-r*.3-r-sq*1.8);pdf.rect(tx2-sq/2,ty2-sq/2,sq,sq,'F');}
    const[ax,ay]=rp(0,0);pdf.circle(ax,ay,.8,'S');
  }
  else if(type==='tecla-s'||type==='tecla-d'||type==='tecla-t'){
    const lineLen=r*2.2,angle=-Math.PI/4;
    const ex=Math.cos(angle)*lineLen,ey=Math.sin(angle)*lineLen;
    const[wx1,wy1]=rp(-r*1.4,0);const[wx2,wy2]=rp(r*1.4,0);pdf.line(wx1,wy1,wx2,wy2);
    const[lx1,ly1]=rp(0,0);const[lx2,ly2]=rp(ex,ey);pdf.line(lx1,ly1,lx2,ly2);
    const perp=angle+Math.PI/2,gLen=r*.65;
    const ng={'tecla-s':1,'tecla-d':2,'tecla-t':3}[type]||1;
    for(let g=0;g<ng;g++){
      const t=.55+g*.18;const gx=ex*t,gy=ey*t;
      const[gx1,gy1]=rp(gx,gy);
      const[gx2,gy2]=rp(gx+Math.cos(perp)*gLen,gy+Math.sin(perp)*gLen);
      pdf.line(gx1,gy1,gx2,gy2);
    }
    const[ax,ay]=rp(0,0);pdf.circle(ax,ay,.8,'S');
  }
  else if(type==='tecla-de'){
    const lineLen=r*2.2,angle=-Math.PI/4;
    const ex=Math.cos(angle)*lineLen,ey=Math.sin(angle)*lineLen;
    const ox=Math.cos(angle+Math.PI)*lineLen*.7,oy=Math.sin(angle+Math.PI)*lineLen*.7;
    const[wx1,wy1]=rp(-r*1.4,0);const[wx2,wy2]=rp(r*1.4,0);pdf.line(wx1,wy1,wx2,wy2);
    const[lx1,ly1]=rp(ox,oy);const[lx2,ly2]=rp(ex,ey);pdf.line(lx1,ly1,lx2,ly2);
    const perp=angle+Math.PI/2,gLen=r*.65;
    const[g1x,g1y]=rp(ex,ey);const[g2x,g2y]=rp(ex+Math.cos(perp)*gLen,ey+Math.sin(perp)*gLen);pdf.line(g1x,g1y,g2x,g2y);
    const[g3x,g3y]=rp(ox,oy);const[g4x,g4y]=rp(ox+Math.cos(perp)*gLen,oy+Math.sin(perp)*gLen);pdf.line(g3x,g3y,g4x,g4y);
    const[ax,ay]=rp(0,0);pdf.circle(ax,ay,.8,'S');
  }
  else if(type==='tablero'){
    const hw=r*1.6,hh=r*.65;
    const[tlx,tly]=rp(-hw,-hh);pdf.rect(tlx,tly,hw*2,hh*2,'S');
    const[dx1,dy1]=rp(-hw,-hh);const[dx2,dy2]=rp(hw,hh);pdf.line(dx1,dy1,dx2,dy2);
    const[dx3,dy3]=rp(hw,-hh);const[dx4,dy4]=rp(-hw,hh);pdf.line(dx3,dy3,dx4,dy4);
  }
  else if(type==='fan-e'){
    pdf.circle(cx,cy,r,'S');
    pdf.setFontSize(r*2);pdf.setTextColor(rgb.r,rgb.g,rgb.b);
    pdf.text('⊕',cx,cy+r*.35,{align:'center'});
  }
}

      pdf.text(lbl,MARGIN+2,y);pdf.text(val,MARGIN+100,y);y+=5.5;
    });
    y+=4;
  }

  // Pie de página
  pdf.setFontSize(6);pdf.setTextColor(150,155,165);
  pdf.text('Generado con ElectroCad 2.0',PW/2,PH-MARGIN+2,{align:'center'});
}

// Calcular bounding box de todos los elementos del plano
function getWorldBBox(){
  const pts=[];
  walls.forEach(w=>{pts.push({x:w.x1,y:w.y1});pts.push({x:w.x2,y:w.y2});});
  boxes.forEach(b=>{const s=BOX_SIZES[b.type];pts.push({x:b.x-s.w/2,y:b.y-s.h/2});pts.push({x:b.x+s.w/2,y:b.y+s.h/2});});
  pipes.forEach(p=>pipeAllPts(p).forEach(pt=>pts.push(pt)));
  elecWires.forEach(w=>w.pts.forEach(pt=>pts.push(pt)));
  elecSyms.forEach(s=>{const r=SYM_R*1.5;pts.push({x:s.x-r,y:s.y-r});pts.push({x:s.x+r,y:s.y+r});});
  dims.forEach(d=>{pts.push(d.p1);pts.push(d.p2);});
  if(!pts.length)return null;
  const minX=Math.min(...pts.map(p=>p.x))-10;
  const minY=Math.min(...pts.map(p=>p.y))-10;
  const maxX=Math.max(...pts.map(p=>p.x))+10;
  const maxY=Math.max(...pts.map(p=>p.y))+10;
  return{minX,minY,maxX,maxY,w:maxX-minX,h:maxY-minY};
}

// Convertir color hex a RGB
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16)||0;
  const g=parseInt(hex.slice(3,5),16)||0;
  const b=parseInt(hex.slice(5,7),16)||0;
  return{r,g,b};
}

// TECLADO
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,select,textarea'))return;
  const k=e.key.toLowerCase();
  if(k==='s')setTool('sel');
  if(k==='w')setTool('wall');
  if(k==='e')setTool('era');
  if(k==='h')setTool('pan');
  if(k==='o')setTool('oct');
  if(k==='r')setTool('rct');
  if(k==='t')setTool('tab');
  if(k==='c')setTool('pipe');
  if(k==='d')setTool('dim');
  if(e.key==='1')setTool('luz');
  if(e.key==='2')setTool('luz-p');
  if(e.key==='3')setTool('toma-s');
  if(e.key==='4')setTool('toma-d');
  if(e.key==='5')setTool('tecla-s');
  if(e.key==='6')setTool('tecla-d');
  if(e.key==='7')setTool('tecla-t');
  if(e.key==='8')setTool('tecla-de');
  if(e.key==='9')setTool('tablero');
  if(e.key==='0')setTool('fan-e');
  if(e.key==='F1'){e.preventDefault();setTool('wire-s');}
  if(e.key==='F2'){e.preventDefault();setTool('wire-r');}
  if(e.key==='Escape'){
    wDraw.on=false;wDraw.start=null;cancelPipeDraw();
    dimDraw.phase=0;dimDraw.p1=null;dimDraw.p2=null;
    wireDraw.on=false;wireDraw.pts=[];
    selBox=null;selPipe=null;selWall=null;selDim=null;selSym=null;selEWire=null;
    pipeEdit.seg=null;pipeEdit.ptIdx=-1;pipeEdit.dragging=false;
    wireEdit.seg=null;wireEdit.ptIdx=-1;wireEdit.dragging=false;
    renderRP();render();
  }
  if(e.key==='Delete'||e.key==='Backspace'){
    if(selBox)delBox(selBox.id);
    else if(selPipe)delPipe(selPipe.id);
    else if(selWall)delWall(selWall.id);
    else if(selDim){saveU();dims=dims.filter(d=>d.id!==selDim.id);selDim=null;setDirty();render();}
    else if(selSym){saveU();elecSyms=elecSyms.filter(s=>s.id!==selSym.id);selSym=null;setDirty();render();renderRP();}
    else if(selEWire){saveU();elecWires=elecWires.filter(w=>w.id!==selEWire.id);selEWire=null;setDirty();render();}
  }
  if(e.ctrlKey&&k==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&k==='s'){e.preventDefault();saveProject();}
});

// ═══════════════════════════════════════════════════════════════════════
// CIRCUITOS
// ═══════════════════════════════════════════════════════════════════════
const PALETTE=['#f04040','#4488ff','#ff8800','#00cc44','#cc44ff','#00cccc','#ffcc00','#ff4488'];
function addCircuit(){
  const name=document.getElementById('newCircName')?.value.trim();
  const amp=parseInt(document.getElementById('newCircAmp')?.value)||10;
  if(!name)return;
  saveU();
  const col=PALETTE[(circuits.length)%PALETTE.length];
  circuits.push({id:circuitIdCtr++,name,color:col,amp});
  activeCircuitId=circuits[circuits.length-1].id;
  document.getElementById('newCircName').value='';
  document.getElementById('newCircAmp').value='';
  renderRP();
}
function delCircuit(id){
  if(circuits.length<=1){alert('Debe quedar al menos un circuito.');return;}
  saveU();circuits=circuits.filter(c=>c.id!==id);
  if(activeCircuitId===id)activeCircuitId=circuits[0].id;
  renderRP();
}
function setActiveCircuit(id){activeCircuitId=id;renderRP();}
function pickColor(id){
  const c=circuits.find(x=>x.id===id);if(!c)return;
  const col=prompt('Color hex (ej: #ff4444):',c.color);
  if(col&&/^#[0-9a-fA-F]{6}$/.test(col)){saveU();c.color=col;render();renderRP();}
}

// ═══════════════════════════════════════════════════════════════════════
// INIT Y RESIZE
// ═══════════════════════════════════════════════════════════════════════
function resizeCanvas(){
  const r=cva.getBoundingClientRect();
  cv.width=Math.floor(r.width);
  cv.height=Math.max(1,Math.floor(r.height)-22);
  render();
}

window.addEventListener('load',()=>{
  resizeCanvas();
  panX=cv.width/2;panY=cv.height/2;
  setTool('sel');renderRP();
  const lastId=localStorage.getItem('ec2_last');
  if(lastId){
    const all=JSON.parse(localStorage.getItem('ec2_p')||'{}');const p=all[lastId];
    if(p){
      walls=p.walls||[];boxes=p.boxes||[];pipes=p.pipes||[];dims=p.dims||[];
      wId=p.wId||1;bId=p.bId||1;pId=p.pId||1;dId=p.dId||1;
      scale=p.scale||50;gridCm=p.gridCm||25;
      document.getElementById('projName').value=p.name||'Plano';
      document.getElementById('sb-sc').textContent=`1:${scale}`;
      setSaved();
    }
  }
  render();renderRP();
});

window.addEventListener('resize',resizeCanvas);
setInterval(()=>{if(dirty)saveProject();},30000);
</script>
